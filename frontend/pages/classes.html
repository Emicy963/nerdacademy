<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Classes — Acadêmico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <style>
    /* ── Status badge variants ─────────────────────── */
    .status-open        { background:var(--color-blue-bg);  color:var(--color-blue); }
    .status-in_progress { background:var(--color-amber-bg); color:#8A5E10; }
    .status-closed      { background:var(--bg-raised);      color:var(--text-secondary); }

    /* ── Row actions ───────────────────────────────── */
    .row-actions {
      display:flex; align-items:center; gap:var(--sp-1);
      opacity:0; transition:opacity var(--transition-fast);
    }
    tbody tr:hover .row-actions { opacity:1; }

    /* ── Detail panel ──────────────────────────────── */
    .detail-panel {
      position:fixed; top:0; right:0;
      height:100vh; width:440px;
      background:var(--bg-surface);
      border-left:1px solid var(--border-default);
      box-shadow:var(--shadow-lg);
      z-index:300; display:flex; flex-direction:column;
      transform:translateX(100%);
      transition:transform var(--transition-base);
    }
    .detail-panel.open { transform:translateX(0); }

    .detail-panel__header {
      padding:var(--sp-5) var(--sp-6);
      border-bottom:1px solid var(--border-default);
      flex-shrink:0;
    }
    .detail-panel__body {
      flex:1; overflow-y:auto;
      display:flex; flex-direction:column;
    }
    .detail-panel__footer {
      padding:var(--sp-4) var(--sp-6);
      border-top:1px solid var(--border-default);
      display:flex; gap:var(--sp-2); flex-shrink:0;
      flex-wrap:wrap;
    }

    /* Panel tabs */
    .panel-tabs {
      display:flex; border-bottom:1px solid var(--border-default);
      padding:0 var(--sp-6); flex-shrink:0;
    }
    .panel-tab {
      height:40px; padding:0 var(--sp-1); margin-right:var(--sp-5);
      font-size:13px; font-weight:500; color:var(--text-tertiary);
      cursor:pointer; border:none; background:none;
      border-bottom:2px solid transparent;
      transition:color var(--transition-fast), border-color var(--transition-fast);
    }
    .panel-tab:hover  { color:var(--text-primary); }
    .panel-tab.active { color:var(--text-primary); border-bottom-color:var(--text-primary); }

    .panel-tab-content {
      display:none; padding:var(--sp-5) var(--sp-6);
      flex-direction:column; gap:var(--sp-4); flex:1;
    }
    .panel-tab-content.active { display:flex; }

    /* Detail fields */
    .detail-field__label {
      font-size:11px; font-weight:600; letter-spacing:0.06em;
      text-transform:uppercase; color:var(--text-tertiary); margin-bottom:var(--sp-1);
    }
    .detail-field__value { font-size:14px; color:var(--text-primary); line-height:1.5; }
    .detail-field__empty { font-size:13px; color:var(--text-tertiary); font-style:italic; }

    /* ── Enrolment list in panel ───────────────────── */
    .enrollment-list { display:flex; flex-direction:column; gap:var(--sp-2); }
    .enrollment-item {
      display:flex; align-items:center; justify-content:space-between;
      padding:var(--sp-2) var(--sp-3);
      background:var(--bg-canvas);
      border:1px solid var(--border-default);
      border-radius:var(--radius-md);
    }
    .enrollment-item__left { display:flex; align-items:center; gap:var(--sp-2); }
    .enrollment-avatar {
      width:24px; height:24px; border-radius:50%;
      background:var(--color-blue-bg); color:var(--color-blue);
      font-size:9px; font-weight:700; display:flex;
      align-items:center; justify-content:center; flex-shrink:0;
    }
    .enrollment-item__name { font-size:13px; font-weight:500; color:var(--text-primary); }
    .enrollment-item__code {
      font-size:11px; color:var(--text-tertiary);
      font-family:var(--font-mono);
    }
    .drop-btn {
      opacity:0; transition:opacity var(--transition-fast);
      color:var(--color-red);
    }
    .enrollment-item:hover .drop-btn { opacity:1; }

    /* Enrol student search */
    .enrol-search-wrap { position:relative; }
    .enrol-dropdown {
      position:absolute; top:calc(100% + 4px); left:0; right:0;
      background:var(--bg-surface);
      border:1px solid var(--border-strong);
      border-radius:var(--radius-md);
      box-shadow:var(--shadow-md);
      z-index:10; max-height:200px; overflow-y:auto;
      display:none;
    }
    .enrol-dropdown.open { display:block; }
    .enrol-option {
      display:flex; align-items:center; justify-content:space-between;
      padding:var(--sp-2) var(--sp-3);
      font-size:13px; cursor:pointer;
      border-bottom:1px solid var(--border-default);
      transition:background var(--transition-fast);
    }
    .enrol-option:last-child { border-bottom:none; }
    .enrol-option:hover { background:var(--bg-canvas); }
    .enrol-option__name { font-weight:500; color:var(--text-primary); }
    .enrol-option__code {
      font-size:11px; color:var(--text-tertiary);
      font-family:var(--font-mono);
    }

    /* ── Panel backdrop ────────────────────────────── */
    .panel-backdrop { position:fixed; inset:0; z-index:299; display:none; }
    .panel-backdrop.open { display:block; }

    /* ── Filter pills ──────────────────────────────── */
    .filter-pill {
      display:inline-flex; align-items:center; gap:var(--sp-1);
      height:26px; padding:0 var(--sp-2) 0 var(--sp-3);
      background:var(--text-primary); color:var(--text-inverse);
      border-radius:99px; font-size:12px; font-weight:500;
    }
    .filter-pill button {
      background:none; border:none; cursor:pointer;
      color:var(--text-inverse); opacity:0.7;
      display:flex; padding:2px; border-radius:50%;
    }
    .filter-pill button:hover { opacity:1; }

    /* ── Modal form ────────────────────────────────── */
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:var(--sp-4); }
    @media (max-width:480px) { .form-row { grid-template-columns:1fr; } }

    /* ── Toast ─────────────────────────────────────── */
    .toast {
      position:fixed; bottom:24px; right:24px; z-index:999;
      background:var(--text-primary); color:var(--text-inverse);
      padding:10px 16px; border-radius:var(--radius-lg);
      font-size:13px; font-weight:500; box-shadow:var(--shadow-lg);
      display:flex; align-items:center; gap:var(--sp-2);
      transform:translateY(8px); opacity:0;
      transition:opacity var(--transition-base), transform var(--transition-base);
      pointer-events:none;
    }
    .toast.visible { opacity:1; transform:translateY(0); }
    .toast.error   { background:var(--color-red); }

    /* ── Skeleton ──────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position:-600px 0; }
      100% { background-position: 600px 0; }
    }
    .skel {
      display:inline-block; border-radius:var(--radius-sm);
      background:linear-gradient(90deg,var(--bg-raised) 25%,var(--border-default) 50%,var(--bg-raised) 75%);
      background-size:600px 100%;
      animation:shimmer 1.4s ease-in-out infinite;
    }

    /* ── Student view: enrollment cards ────────────── */
    .enrol-card-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
      gap:var(--sp-4);
    }
    .enrol-card {
      background:var(--bg-surface);
      border:1px solid var(--border-default);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      padding:var(--sp-5);
      display:flex; flex-direction:column; gap:var(--sp-3);
    }
    .enrol-card__course {
      font-size:11px; font-weight:600; letter-spacing:0.05em;
      text-transform:uppercase; color:var(--text-tertiary);
    }
    .enrol-card__name { font-size:15px; font-weight:600; color:var(--text-primary); line-height:1.3; }
    .enrol-card__trainer { font-size:12px; color:var(--text-secondary); }
    .enrol-card__dates {
      font-size:12px; color:var(--text-tertiary);
      font-family:var(--font-mono);
    }
    .enrol-card__footer {
      display:flex; align-items:center; justify-content:space-between;
      padding-top:var(--sp-3);
      border-top:1px solid var(--border-default);
      margin-top:auto;
    }
  </style>
</head>
<body>

<div id="icon-sprite" style="display:none"></div>
<div id="sidebar-backdrop"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:199;"
     onclick="document.getElementById('sidebar').classList.remove('open')"></div>

<div class="app">

  <!-- ── Sidebar ──────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <svg viewBox="0 0 14 14" fill="none" width="14" height="14">
          <path d="M7 1L12.5 4V10L7 13L1.5 10V4L7 1Z" fill="currentColor"/>
        </svg>
      </div>
      <span class="sidebar__name">Acadêmico</span>
      <span class="sidebar__edition">Beta</span>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="sidebar-avatar">--</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
          <div class="sidebar__user-role"  id="sidebar-user-role">—</div>
        </div>
        <button class="sidebar__logout" id="logout-btn" title="Sign out">
          <svg width="16" height="16"><use href="#icon-logout"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <button class="topbar__icon-btn" id="menu-toggle" aria-label="Menu" style="display:none">
        <svg width="16" height="16"><use href="#icon-menu"/></svg>
      </button>
      <nav class="topbar__breadcrumb" id="topbar-breadcrumb"></nav>
      <label class="topbar__search">
        <svg width="14" height="14"><use href="#icon-search"/></svg>
        <input type="search" placeholder="Search anything…" autocomplete="off"/>
      </label>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" aria-label="Notifications">
          <svg width="16" height="16"><use href="#icon-bell"/></svg>
        </button>
      </div>
    </header>

    <main class="page">

      <div class="page-header">
        <div class="page-header__left">
          <h1 class="page-header__title">Classes</h1>
          <p class="page-header__subtitle" id="subtitle">Loading…</p>
        </div>
        <div class="page-header__actions" id="header-actions"></div>
      </div>

      <!-- Toolbar (admin/trainer only) -->
      <div class="toolbar" id="toolbar" style="display:none">
        <label class="toolbar__search">
          <svg width="14" height="14"><use href="#icon-search"/></svg>
          <input type="text" id="search-input"
                 placeholder="Search by name…" autocomplete="off"/>
        </label>

        <select class="form-select" id="filter-status"
                style="width:148px;height:34px;box-shadow:var(--shadow-sm)">
          <option value="">All statuses</option>
          <option value="open">Open</option>
          <option value="in_progress">In Progress</option>
          <option value="closed">Closed</option>
        </select>

        <div class="toolbar__spacer"></div>
        <span id="filter-pills" style="display:flex;gap:var(--sp-2)"></span>
      </div>

      <!-- Content injected by JS -->
      <div id="content-area">
        <!-- skeleton -->
        <div class="table-wrapper">
          <table><thead><tr>
            <th>Name</th><th>Course</th><th>Trainer</th>
            <th>Dates</th><th>Students</th><th>Status</th><th style="width:60px"></th>
          </tr></thead>
          <tbody id="table-body">
            <tr><td colspan="7" style="padding:0">
              <div style="padding:12px 16px;display:flex;flex-direction:column;gap:10px">
                ${[1,2,3,4,5].map(() => `
                  <div style="display:flex;align-items:center;gap:12px">
                    <div class="skel" style="height:13px;width:180px"></div>
                    <div class="skel" style="height:13px;width:100px"></div>
                    <div class="skel" style="height:13px;width:110px"></div>
                    <div class="skel" style="height:13px;width:130px;margin-left:auto"></div>
                    <div class="skel" style="height:18px;width:70px;border-radius:99px"></div>
                  </div>`).join('')}
              </div>
            </td></tr>
          </tbody></table>
        </div>
      </div>

      <div class="pagination" id="pagination"
           style="display:none;margin-top:var(--sp-4);background:var(--bg-surface);
                  border:1px solid var(--border-default);border-radius:var(--radius-lg)">
        <span class="pagination__info" id="pagination-info"></span>
        <div class="pagination__controls" id="pagination-controls"></div>
      </div>

    </main>
  </div>
</div>

<!-- ── Detail panel ───────────────────────────────── -->
<div class="panel-backdrop" id="panel-backdrop"></div>
<aside class="detail-panel" id="detail-panel" aria-label="Class details">
  <div class="detail-panel__header">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:var(--sp-3)">
      <div style="flex:1;min-width:0">
        <div class="t-heading" id="panel-name"
             style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">—</div>
        <div style="display:flex;align-items:center;gap:var(--sp-2);margin-top:4px">
          <span id="panel-status" class="badge badge-gray">—</span>
          <span style="font-size:12px;color:var(--text-tertiary)" id="panel-course">—</span>
        </div>
      </div>
      <button class="btn btn-ghost btn-icon" id="panel-close" aria-label="Close">
        <svg width="14" height="14"><use href="#icon-close"/></svg>
      </button>
    </div>
  </div>

  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="info">Details</button>
    <button class="panel-tab"        data-tab="enrollments">Students</button>
  </div>

  <div class="panel-tab-content active" id="tab-info"></div>
  <div class="panel-tab-content"        id="tab-enrollments"></div>

  <div class="detail-panel__footer" id="panel-footer"></div>
</aside>

<!-- ── Create / Edit modal ───────────────────────── -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true"
     aria-labelledby="modal-title">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2 class="t-heading" id="modal-title">New class</h2>
      <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">
        <svg width="14" height="14"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="modal-body">

      <div class="form-group">
        <label class="form-label" for="f-name">
          Class name <span style="color:var(--color-red)">*</span>
        </label>
        <input class="form-input" type="text" id="f-name"
               placeholder="Python Basics — Turma A" autocomplete="off"/>
        <span class="form-error" id="e-name"></span>
      </div>

      <div class="form-row">
        <div class="form-group" id="course-group">
          <label class="form-label" for="f-course">
            Course <span style="color:var(--color-red)">*</span>
          </label>
          <select class="form-select" id="f-course">
            <option value="">Loading courses…</option>
          </select>
          <span class="form-error" id="e-course"></span>
        </div>
        <div class="form-group" id="trainer-group">
          <label class="form-label" for="f-trainer">
            Trainer <span style="color:var(--color-red)">*</span>
          </label>
          <select class="form-select" id="f-trainer">
            <option value="">Loading trainers…</option>
          </select>
          <span class="form-error" id="e-trainer"></span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f-start">
            Start date <span style="color:var(--color-red)">*</span>
          </label>
          <input class="form-input" type="date" id="f-start"/>
          <span class="form-error" id="e-start"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-end">
            End date <span style="color:var(--color-red)">*</span>
          </label>
          <input class="form-input" type="date" id="f-end"/>
          <span class="form-error" id="e-end"></span>
        </div>
      </div>

      <!-- Edit-only: status + trainer change -->
      <div id="edit-only" style="display:none">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="f-status">Status</label>
            <select class="form-select" id="f-status">
              <option value="open">Open</option>
              <option value="in_progress">In Progress</option>
              <option value="closed">Closed</option>
            </select>
          </div>
        </div>
      </div>

      <div class="alert alert-error" id="modal-error" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary"   id="modal-save">
        <span id="modal-save-label">Create class</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────── -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
       stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <use href="#icon-check"/>
  </svg>
  <span id="toast-text"></span>
</div>

<script type="module">
import { initLayout, setBreadcrumb } from '../js/layout.js';
import { classes, courses, trainers, students } from '../js/api.js';

// ── Bootstrap ──────────────────────────────────────
const user = initLayout('classes');
if (!user) throw new Error('unauthenticated');

setBreadcrumb([{ label: 'Classes', current: true }]);

fetch('../components/icons.html')
  .then(r => r.text())
  .then(h => { document.getElementById('icon-sprite').innerHTML = h; });

const menuBtn = document.getElementById('menu-toggle');
const sidebar  = document.getElementById('sidebar');
menuBtn.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
window.addEventListener('resize', () => {
  menuBtn.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
});
menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

// ── Role flags ─────────────────────────────────────
const isAdmin   = user.role === 'admin';
const isTrainer = user.role === 'trainer';
const isStudent = user.role === 'student';
const canWrite  = isAdmin;
const canSeeEnrollments = isAdmin || isTrainer;

// Show toolbar for non-students
if (!isStudent) {
  document.getElementById('toolbar').style.display = 'flex';
}

// Admin: show new class button
if (canWrite) {
  document.getElementById('header-actions').innerHTML = `
    <button class="btn btn-primary" id="new-class-btn">
      <svg width="14" height="14"><use href="#icon-plus"/></svg>
      New class
    </button>`;
  document.getElementById('new-class-btn')
    .addEventListener('click', () => openModal());
}

// ── State ──────────────────────────────────────────
let currentPage  = 1;
let totalPages   = 1;
let totalCount   = 0;
let searchQuery  = '';
let filterStatus = '';
let editingId    = null;
let activeRow    = null;
let panelClassId = null;

// Cached dropdown data
let cachedCourses  = null;
let cachedTrainers = null;

// ── Toast ──────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  document.getElementById('toast-text').textContent = msg;
  el.classList.toggle('error', isError);
  el.classList.add('visible');
  toastTimer = setTimeout(() => el.classList.remove('visible'), 3500);
}

// ── Helpers ────────────────────────────────────────
function initials(name = '') {
  return name.split(' ').map(w => w[0] ?? '').slice(0, 2).join('').toUpperCase();
}
function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-GB',
    { day:'2-digit', month:'short', year:'numeric' }); }
  catch { return iso; }
}
function statusBadge(status) {
  const map = {
    open:        ['badge-blue',  'Open'],
    in_progress: ['badge-amber', 'In Progress'],
    closed:      ['badge-gray',  'Closed'],
  };
  const [cls, label] = map[status] ?? ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}
function enrollmentBadge(status) {
  const map = {
    active:    ['badge-blue',  'Active'],
    completed: ['badge-green', 'Completed'],
    dropped:   ['badge-red',   'Dropped'],
  };
  const [cls, label] = map[status] ?? ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── Load ───────────────────────────────────────────
async function loadClasses(page = 1) {
  currentPage = page;

  // Students see their enrolments in a card grid
  if (isStudent) {
    loadStudentView();
    return;
  }

  const params = { page, page_size: 20 };
  if (searchQuery)    params.search = searchQuery;
  if (filterStatus)   params.status = filterStatus;

  try {
    const data = await classes.list(params);
    totalPages = data.pages ?? 1;
    totalCount = data.count ?? 0;
    renderTable(data.results ?? []);
    renderPagination();
    document.getElementById('subtitle').textContent =
      `${totalCount} class${totalCount !== 1 ? 'es' : ''} in your institution`;
  } catch (err) {
    renderError(err.message);
  }
}

// ── Student view: enrolled classes as cards ────────
async function loadStudentView() {
  document.getElementById('toolbar').style.display = 'none';
  document.getElementById('pagination').style.display = 'none';

  const area = document.getElementById('content-area');
  // skeleton
  area.innerHTML = `
    <div class="enrol-card-grid">
      ${[1,2,3].map(() => `
        <div class="enrol-card">
          <div class="skel" style="height:11px;width:60px"></div>
          <div class="skel" style="height:16px;width:80%;margin-top:8px"></div>
          <div class="skel" style="height:12px;width:50%"></div>
          <div class="skel" style="height:12px;width:70%"></div>
          <div style="display:flex;justify-content:space-between;padding-top:12px;border-top:1px solid var(--border-default)">
            <div class="skel" style="height:18px;width:60px;border-radius:99px"></div>

// ── Pagination ─────────────────────────────────────
function renderPagination() {
  const wrap  = document.getElementById('pagination');
  const info  = document.getElementById('pagination-info');
  const ctrls = document.getElementById('pagination-controls');
  if (totalPages <= 1 && totalCount <= 20) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  const start = (currentPage - 1) * 20 + 1;
  const end   = Math.min(currentPage * 20, totalCount);
  info.textContent = `${start}–${end} of ${totalCount}`;
  const pages = [];
  if (totalPages <= 7) { for (let i = 1; i <= totalPages; i++) pages.push(i); }
  else {
    pages.push(1);
    if (currentPage > 3) pages.push('…');
    for (let i = Math.max(2, currentPage-1); i <= Math.min(totalPages-1, currentPage+1); i++) pages.push(i);
    if (currentPage < totalPages-2) pages.push('…');
    pages.push(totalPages);
  }
  ctrls.innerHTML = `
    <button class="pagination__btn" ${currentPage===1?'disabled':''} onclick="changePage(${currentPage-1})">
      <svg width="12" height="12"><use href="#icon-chevron-left"/></svg>
    </button>
    ${pages.map(p => p==='…'
      ? `<span style="padding:0 4px;color:var(--text-tertiary);font-size:12px">…</span>`
      : `<button class="pagination__btn ${p===currentPage?'active':''}" onclick="changePage(${p})">${p}</button>`
    ).join('')}
    <button class="pagination__btn" ${currentPage===totalPages?'disabled':''} onclick="changePage(${currentPage+1})">
      <svg width="12" height="12"><use href="#icon-chevron-right"/></svg>
    </button>`;
}
window.changePage = p => { if (p>=1 && p<=totalPages) { loadClasses(p); scrollTo({top:0,behavior:'smooth'}); } };

let searchTimer;
document.getElementById('search-input')?.addEventListener('input', e => {

function updateFilterPills() {
  const container = document.getElementById('filter-pills');
  const pills = [];

    pills.push({ label: labels[filterStatus] ?? filterStatus,
      clear: () => { filterStatus=''; document.getElementById('filter-status').value=''; }});
  }
  container.innerHTML = pills.map((p,i) => `
    <span class="filter-pill">${p.label}
      <button onclick="clearPill(${i})" aria-label="Remove filter">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 3l10 10M13 3L3 13"/>

}

// Enrol search (live student search → dropdown)
function initEnrolSearch(classId) {
  const input    = document.getElementById('enrol-search');
  const dropdown = document.getElementById('enrol-dropdown');
  let timer;

  input?.addEventListener('input', () => {
    clearTimeout(timer);
    const q = input.value.trim();
    if (q.length < 2) { dropdown.classList.remove('open'); return; }
    timer = setTimeout(async () => {
      try {
        const data = await students.list({ search: q, is_active: 'true', page_size: 10 });
        const list  = data.results ?? [];
        if (!list.length) {
          dropdown.innerHTML = `<div class="enrol-option" style="color:var(--text-tertiary);cursor:default">
            No students found.</div>`;
        } else {
          dropdown.innerHTML = list.map(s => `
            <div class="enrol-option" data-id="${s.id}"
                 data-name="${s.full_name}">
              <div>
                <div class="enrol-option__name">${s.full_name}</div>
                <div class="enrol-option__code">${s.student_code}</div>
              </div>
              <button class="btn btn-primary btn-sm"
                      onclick="event.stopPropagation();doEnrol('${classId}','${s.id}','${s.full_name}')">
                Enrol
              </button>
            </div>`).join('');
        }
        dropdown.classList.add('open');
      } catch { dropdown.classList.remove('open'); }
    }, 280);
  });

  document.addEventListener('click', e => {
    if (!e.target.closest('.enrol-search-wrap')) dropdown.classList.remove('open');
  });
}

window.doEnrol = async (classId, studentId, name) => {
  const dropdown = document.getElementById('enrol-dropdown');
  dropdown.classList.remove('open');
  document.getElementById('enrol-search').value = '';
  try {
    await classes.enrollments.enroll(classId, studentId);
    showToast(`${name} enrolled successfully.`);
    // Reload the tab
    document.getElementById('tab-enrollments').querySelector('.enrollment-list')?.remove();
    loadEnrollmentsTab(classId);
    // Reload table to update count
    loadClasses(currentPage);
  } catch (err) {
    showToast(err.message, true);
  }
};

async function handleDropEnrollment(classId, enrollmentId) {
  if (!confirm('Drop this student from the class?')) return;
  try {
    await classes.enrollments.drop(classId, enrollmentId);
    showToast('Enrolment dropped.');
    // Refresh the tab
    const tab = document.getElementById('tab-enrollments');
    const listEl = tab.querySelector('.enrollment-list');
    if (listEl) listEl.innerHTML = '';
    loadEnrollmentsTab(classId);
    loadClasses(currentPage);
  } catch (err) {
    showToast(err.message, true);
  }
}

// ── Tab switching ──────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.panel-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel-tab-content').forEach(c =>
    c.classList.toggle('active', c.id === `tab-${name}`));
}

document.querySelectorAll('.panel-tab').forEach(tab =>
  tab.addEventListener('click', () => {
    const name = tab.dataset.tab;
    switchTab(name);
    if (name === 'enrollments' && panelClassId && canSeeEnrollments) {
      const el = document.getElementById('tab-enrollments');
      if (!el.innerHTML.trim()) loadEnrollmentsTab(panelClassId);
    }
  }));

function closeDetailPanel() {
  detailPanel.classList.remove('open');
  panelBackdrop.classList.remove('open');
  panelClassId = null;
  document.querySelectorAll('tbody tr').forEach(r => r.style.background = '');
}

document.getElementById('panel-close').addEventListener('click', closeDetailPanel);
panelBackdrop.addEventListener('click', closeDetailPanel);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetailPanel(); closeModal(); }
});

// ── Close class ────────────────────────────────────
async function handleCloseClass(id, name) {
  if (!confirm(`Close "${name}"?\nAll active enrolments will be marked as completed.`)) return;
  try {
    await classes.close(id);
    showToast(`"${name}" has been closed.`);
    closeDetailPanel();
    loadClasses(currentPage);
  } catch (err) {
    showToast(err.message, true);
  }
}

// ── Delete class ───────────────────────────────────
async function handleDelete(id, name) {
  if (!confirm(`Delete "${name}"?\nThis cannot be undone.`)) return;
  try {
    await classes.delete(id);
    showToast(`"${name}" has been deleted.`);
    closeDetailPanel();
    loadClasses(currentPage);
  } catch (err) {
    showToast(err.message, true);
  }
}

    saveLabel.textContent  = 'Save changes';
    editOnly.style.display   = 'block';
    courseGrp.style.display  = 'none'; // course not editable

    await loadDropdowns();

    classes.get(id).then(cl => {
      document.getElementById('f-name').value  = cl.name  ?? '';
      document.getElementById('f-start').value = cl.start_date ?? '';
      document.getElementById('f-end').value   = cl.end_date   ?? '';
      document.getElementById('f-status').value = cl.status ?? 'open';
      // Set trainer dropdown
      const tSel = document.getElementById('f-trainer');
      if (cl.trainer?.id) tSel.value = cl.trainer.id;
    });
  } else {
    modalTitle.textContent = 'New class';
    saveLabel.textContent  = 'Create class';
    editOnly.style.display   = 'none';
    courseGrp.style.display  = 'block';
    trainerGrp.style.display = 'block';
    ['f-name','f-start','f-end'].forEach(fId =>
      { document.getElementById(fId).value = ''; });

    await loadDropdowns();
  }

  modal.classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function closeModal() { modal.classList.remove('open'); editingId = null; }

document.getElementById('modal-close').addEventListener('click',  closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

function clearModalErrors() {
  ['f-name','f-course','f-trainer','f-start','f-end'].forEach(fId => {
    document.getElementById(fId)?.classList.remove('error');
  });
  ['e-name','e-course','e-trainer','e-start','e-end'].forEach(eId => {
    const el = document.getElementById(eId);
    if (el) { el.textContent = ''; el.style.display = 'none'; }
  });
}

function showFieldErr(fId, eId, msg) {
  document.getElementById(fId)?.classList.add('error');
  const el = document.getElementById(eId);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

saveBtn.addEventListener('click', async () => {
  clearModalErrors();
  modalError.style.display = 'none';

  const name     = document.getElementById('f-name').value.trim();
  const courseId = document.getElementById('f-course')?.value;
  const trainerId = document.getElementById('f-trainer').value;
  const startDate = document.getElementById('f-start').value;
  const endDate   = document.getElementById('f-end').value;
  const status    = document.getElementById('f-status')?.value;

  let valid = true;
  if (!name)     { showFieldErr('f-name', 'e-name', 'Class name is required.'); valid = false; }
  if (!editingId && !courseId)
    { showFieldErr('f-course', 'e-course', 'Select a course.'); valid = false; }
  if (!trainerId) { showFieldErr('f-trainer','e-trainer','Select a trainer.'); valid = false; }
  if (!startDate) { showFieldErr('f-start','e-start','Start date is required.'); valid = false; }
  if (!endDate)   { showFieldErr('f-end',  'e-end',  'End date is required.'); valid = false; }
  if (startDate && endDate && startDate >= endDate)
    { showFieldErr('f-end','e-end','End date must be after start date.'); valid = false; }
  if (!valid) return;

  const payload = editingId
    ? { name, trainer_id: trainerId, start_date: startDate, end_date: endDate, status }
    : { name, course_id: courseId, trainer_id: trainerId, start_date: startDate, end_date: endDate };

  saveBtn.disabled = true;
  saveLabel.textContent = editingId ? 'Saving…' : 'Creating…';

  try {
    if (editingId) {
      await classes.update(editingId, payload);
      showToast('Class updated successfully.');
    } else {
      await classes.create(payload);
      showToast('Class created successfully.');
    }
    closeModal();
    loadClasses(currentPage);
  } catch (err) {
    modalError.textContent = err.message ?? 'Something went wrong.';
    modalError.style.display = 'flex';
  } finally {
    saveBtn.disabled = false;
    saveLabel.textContent = editingId ? 'Save changes' : 'Create class';
  }
});

// ── Initial load ───────────────────────────────────
loadClasses(1);
</script>

</body>
