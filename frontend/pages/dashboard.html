<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Matrika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <style>
    /* ── Dashboard-specific styles ──────────────────── */

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: var(--sp-4);
      margin-bottom: var(--sp-8);
    }
    @media (max-width: 1040px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 540px)  { .stats-grid { grid-template-columns: 1fr; } }

    .stat-accent-blue  .stat-card__icon { background: var(--color-blue-bg);  color: var(--color-blue); }
    .stat-accent-amber .stat-card__icon { background: var(--color-amber-bg); color: #8A5E10; }
    .stat-accent-green .stat-card__icon { background: var(--color-green-bg); color: var(--color-green); }
    .stat-accent-gray  .stat-card__icon { background: var(--bg-raised);      color: var(--text-secondary); }

    /* Skeleton stat card */
    .stat-card--loading .stat-card__value,
    .stat-card--loading .stat-card__label,
    .stat-card--loading .stat-card__delta {
      color: transparent;
      border-radius: var(--radius-sm);
    }
    .stat-card--loading .stat-card__value { background: var(--bg-raised); animation: shimmer 1.4s ease-in-out infinite; background-size: 600px 100%; background-image: linear-gradient(90deg, var(--bg-raised) 25%, var(--border-default) 50%, var(--bg-raised) 75%); }
    .stat-card--loading .stat-card__label { background: var(--bg-raised); width: 80px; display: inline-block; }
    .stat-card--loading .stat-card__delta { background: var(--bg-raised); width: 100px; display: inline-block; }

    /* Two-col layout */
    .dash-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: var(--sp-6);
      align-items: start;
    }
    @media (max-width: 960px) { .dash-grid { grid-template-columns: 1fr; } }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: var(--sp-3);
    }

    /* ── Recent items list (classes / grades / enrollments) ── */
    .item-list { display: flex; flex-direction: column; }

    .item-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-5);
      border-bottom: 1px solid var(--border-default);
      transition: background var(--transition-fast);
      text-decoration: none;
      color: inherit;
    }
    .item-row:last-child { border-bottom: none; }
    .item-row:hover { background: #FAFAF8; }

    .item-row__icon {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .item-row__body { flex: 1; min-width: 0; }
    .item-row__title {
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-row__sub {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .item-row__right {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      flex-shrink: 0;
    }

    /* Skeleton row */
    .item-row--skeleton {
      pointer-events: none;
    }
    .skel {
      border-radius: var(--radius-sm);
      display: inline-block;
    }
    .skel-text { height: 13px; }
    .skel-sub  { height: 11px; margin-top: 4px; }

    /* ── Quick actions (sidebar right col) ──────────── */
    .quick-actions { display: flex; flex-direction: column; gap: var(--sp-1); }

    .qa-item {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 13.5px;
      color: var(--text-primary);
      text-decoration: none;
      transition: background var(--transition-fast);
    }
    .qa-item:hover { background: var(--bg-canvas); }

    .qa-item__icon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .qa-item__label { flex: 1; font-weight: 400; }
    .qa-item__count {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      color: var(--text-tertiary);
    }

    /* ── Grade bar (student view) ───────────────────── */
    .grade-bar-wrap {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
    }
    .grade-bar-track {
      flex: 1;
      height: 4px;
      background: var(--bg-raised);
      border-radius: 99px;
      overflow: hidden;
    }
    .grade-bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--color-green);
      transition: width 0.6s ease;
    }
    .grade-bar-fill.mid   { background: var(--color-amber); }
    .grade-bar-fill.low   { background: var(--color-red); }
    .grade-value {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
      color: var(--text-primary);
      min-width: 36px;
      text-align: right;
    }

    /* ── Greeting ────────────────────────────────────── */
    .greeting-name { color: var(--text-primary); }

    /* ── Empty state inside card ────────────────────── */
    .card-empty {
      padding: var(--sp-10) var(--sp-6);
      text-align: center;
      color: var(--text-tertiary);
      font-size: 13px;
    }
    .card-empty svg {
      width: 32px;
      height: 32px;
      margin: 0 auto var(--sp-3);
      opacity: 0.35;
    }
    .card-empty p { margin-top: var(--sp-1); }

    /* ── Trainer: classes today ─────────────────────── */
    .class-today-badge {
      display: inline-flex;
      align-items: center;
      height: 18px;
      padding: 0 6px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .class-today-badge.open        { background: var(--color-blue-bg);  color: var(--color-blue); }
    .class-today-badge.in_progress { background: var(--color-amber-bg); color: #8A5E10; }
    .class-today-badge.closed      { background: var(--bg-raised);      color: var(--text-tertiary); }
  </style>
</head>
<body>

<!-- Icon sprite -->
<div id="icon-sprite" style="display:none"></div>

<!-- Mobile backdrop -->
<div id="sidebar-backdrop" style="
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.4);z-index:199;
" onclick="document.getElementById('sidebar').classList.remove('open')"></div>

<div class="app">

  <!-- ── Sidebar ────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <svg viewBox="0 0 14 14" fill="none" width="14" height="14">
          <path d="M7 1L12.5 4V10L7 13L1.5 10V4L7 1Z" fill="currentColor"/>
        </svg>
      </div>
      <span class="sidebar__name">Matrika</span>
      <span class="sidebar__edition">Beta</span>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div id="sidebar-institution-switcher"></div>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="sidebar-avatar">--</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
          <div class="sidebar__user-role"  id="sidebar-user-role">—</div>
        </div>
        <button class="sidebar__logout" id="logout-btn" title="Sign out">
          <svg width="16" height="16"><use href="#icon-logout"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main ───────────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <button class="topbar__icon-btn" id="menu-toggle" aria-label="Menu" style="display:none">
        <svg width="16" height="16"><use href="#icon-menu"/></svg>
      </button>
      <nav class="topbar__breadcrumb" id="topbar-breadcrumb">
        <span class="topbar__breadcrumb-item current">Dashboard</span>
      </nav>
      <label class="topbar__search">
        <svg width="14" height="14"><use href="#icon-search"/></svg>
        <input type="search" data-i18n-placeholder="ui.searchTopbar" placeholder="Pesquisar…" autocomplete="off"/>
      </label>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" aria-label="Notifications">
          <svg width="16" height="16"><use href="#icon-bell"/></svg>
        </button>
      </div>
    </header>

    <main class="page" id="page-root">
      <!-- injected by JS per role -->
    </main>
  </div>
</div>

<script type="module">
import { initLayout, setBreadcrumb } from '../js/layout.js';
import {
  students, trainers, courses, classes, grades,
  institutions, auth, token
} from '../js/api.js';
import { t } from '../js/i18n.js';
import { initOnboarding } from '../js/onboarding.js';

// ── Bootstrap ──────────────────────────────────────────
const user = initLayout('dashboard');
if (!user) throw new Error('unauthenticated');

initOnboarding();

// Load icons sprite
fetch('../components/icons.html')
  .then(r => r.text())
  .then(h => { document.getElementById('icon-sprite').innerHTML = h; });

// Mobile menu toggle visibility (open/close handled by initMobileToggle in layout.js)
const menuBtn = document.getElementById('menu-toggle');
menuBtn.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
window.addEventListener('resize', () => {
  menuBtn.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
});

// ── Helpers ────────────────────────────────────────────
const root = document.getElementById('page-root');

function greeting() {
  const h = new Date().getHours();
  if (h < 12) return t('dash.morning');
  if (h < 18) return t('dash.afternoon');
  return t('dash.evening');
}

function displayName(u) {
  return u?.full_name?.trim()
    || (u?.email ? u.email.split('@')[0].replace(/[._]/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase()) : 'User');
}

// Skeleton stat card HTML
function statSkeleton(accent) {
  return `
    <div class="stat-card stat-accent-${accent} stat-card--loading">
      <div class="stat-card__icon">&nbsp;</div>
      <div class="stat-card__label">${t('ui.loading')}</div>
      <div class="stat-card__value">—</div>
      <div class="stat-card__delta">—</div>
    </div>`;
}

// Skeleton item rows
function itemSkeletons(n = 4) {
  return Array.from({ length: n }, () => `
    <div class="item-row item-row--skeleton">
      <div class="skel skeleton" style="width:30px;height:30px;border-radius:6px;flex-shrink:0"></div>
      <div style="flex:1;min-width:0">
        <div class="skel skeleton skel-text" style="width:55%"></div>
        <div class="skel skeleton skel-sub"  style="width:40%"></div>
      </div>
      <div class="skel skeleton" style="width:48px;height:18px;border-radius:99px"></div>
    </div>`).join('');
}

// Status badge
function classBadge(status) {
  const map = {
    open:        ['badge-blue',  t('classes.status.open')],
    in_progress: ['badge-amber', t('classes.status.progress')],
    closed:      ['badge-gray',  t('classes.status.closed')],
  };
  const [cls, label] = map[status] ?? ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

// Grade bar colour
function gradeBarClass(pct) {
  if (pct >= 60) return '';
  if (pct >= 40) return 'mid';
  return 'low';
}


// ══════════════════════════════════════════════════════
//  ADMIN DASHBOARD
// ══════════════════════════════════════════════════════
async function renderAdmin() {
  const name = displayName(user);

  // Render shell immediately — data loads in parallel
  root.innerHTML = `
    <div class="page-header">
      <div class="page-header__left">
        <h1 class="page-header__title">${greeting()}, <span class="greeting-name">${name}</span></h1>
        <p class="page-header__subtitle" id="inst-name">${t('dash.subtitle.admin')}</p>
      </div>
      <div class="page-header__actions">
        <a href="students.html" class="btn btn-primary">
          <svg width="14" height="14"><use href="#icon-plus"/></svg>
          ${t('dash.newStudent')}
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="stats-grid">
      ${statSkeleton('blue')}${statSkeleton('amber')}
      ${statSkeleton('green')}${statSkeleton('gray')}
    </div>

    <!-- Content -->
    <div class="dash-grid">
      <div>
        <div class="section-label">${t('dash.section.recent')}</div>
        <div class="card" style="overflow:hidden">
          <div class="item-list" id="classes-list">${itemSkeletons(5)}</div>
          <div class="card-footer" style="display:flex;justify-content:flex-end">
            <a href="classes.html" class="btn btn-ghost btn-sm">${t('dash.viewAllClasses')}</a>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">${t('dash.section.quick')}</div>
        <div class="card card-body" style="padding:var(--sp-2) 0">
          <div class="quick-actions">
            <a href="students.html" class="qa-item">
              <div class="qa-item__icon" style="background:var(--color-blue-bg)">
                <svg width="14" height="14" style="color:var(--color-blue)"><use href="#icon-students"/></svg>
              </div>
              <span class="qa-item__label">${t('dash.qa.students')}</span>
              <span class="qa-item__count" id="qa-students">—</span>
            </a>
            <a href="trainers.html" class="qa-item">
              <div class="qa-item__icon" style="background:var(--color-amber-bg)">
                <svg width="14" height="14" style="color:#8A5E10"><use href="#icon-trainers"/></svg>
              </div>
              <span class="qa-item__label">${t('dash.qa.trainers')}</span>
              <span class="qa-item__count" id="qa-trainers">—</span>
            </a>
            <a href="courses.html" class="qa-item">
              <div class="qa-item__icon" style="background:var(--color-green-bg)">
                <svg width="14" height="14" style="color:var(--color-green)"><use href="#icon-courses"/></svg>
              </div>
              <span class="qa-item__label">${t('dash.qa.courses')}</span>
              <span class="qa-item__count" id="qa-courses">—</span>
            </a>
            <a href="grades.html" class="qa-item">
              <div class="qa-item__icon" style="background:var(--bg-raised)">
                <svg width="14" height="14" style="color:var(--text-secondary)"><use href="#icon-grades"/></svg>
              </div>
              <span class="qa-item__label">${t('dash.qa.gradeReports')}</span>
              <span class="qa-item__count">→</span>
            </a>
          </div>
        </div>

        <div class="section-label" style="margin-top:var(--sp-6)">${t('dash.section.institution')}</div>
        <div class="card card-body" id="inst-card">
          <div class="skel skeleton" style="height:14px;width:60%;margin-bottom:8px"></div>
          <div class="skel skeleton" style="height:12px;width:40%"></div>
        </div>
      </div>
    </div>`;

  // ── Load data in parallel ──────────────────────────
  const [
    studentsRes, trainersRes, coursesRes,
    classesRes,  instData
  ] = await Promise.allSettled([
    students.list({ page_size: 1 }),
    trainers.list({ page_size: 1 }),
    courses.list({ page_size: 1 }),
    classes.list({ page_size: 5 }),
    institutions.me(),
  ]);

  // Institution name
  const inst = instData.status === 'fulfilled' ? instData.value : null;
  document.getElementById('inst-name').textContent =
    inst ? inst.name : t('dash.subtitle.admin');

  // Institution card
  const instCard = document.getElementById('inst-card');
  if (inst) {
    instCard.innerHTML = `
      <div style="font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:4px">
        ${inst.name}
      </div>
      <div style="font-size:12px;color:var(--text-tertiary)">${inst.slug ?? ''}</div>
      <div style="margin-top:var(--sp-4)">
        <span class="badge ${inst.is_active ? 'badge-green' : 'badge-red'}">
          ${inst.is_active ? t('ui.active') : t('ui.inactive')}
        </span>
      </div>`;
  } else {
    instCard.innerHTML = `<p class="t-body-sm">${t('dash.inst.error')}</p>`;
  }

  // Stats
  const sCount = studentsRes.status === 'fulfilled' ? studentsRes.value.count : '—';
  const tCount = trainersRes.status === 'fulfilled' ? trainersRes.value.count : '—';
  const cCount = coursesRes.status  === 'fulfilled' ? coursesRes.value.count  : '—';
  const clOpen = classesRes.status  === 'fulfilled'
    ? classesRes.value.results.filter(c => c.status === 'open' || c.status === 'in_progress').length
    : '—';

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card stat-accent-blue">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-students"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.students')}</div>
      <div class="stat-card__value">${sCount}</div>
      <div class="stat-card__delta">${t('dash.stat.students.delta')}</div>
    </div>
    <div class="stat-card stat-accent-amber">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-trainers"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.trainers')}</div>
      <div class="stat-card__value">${tCount}</div>
      <div class="stat-card__delta">${t('dash.stat.trainers.delta')}</div>
    </div>
    <div class="stat-card stat-accent-green">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-classes"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.classes')}</div>
      <div class="stat-card__value">${clOpen}</div>
      <div class="stat-card__delta">${t('dash.stat.classes.delta')}</div>
    </div>
    <div class="stat-card stat-accent-gray">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-courses"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.courses')}</div>
      <div class="stat-card__value">${cCount}</div>
      <div class="stat-card__delta">${t('dash.stat.courses.delta')}</div>
    </div>`;

  // Quick action counts
  document.getElementById('qa-students').textContent = sCount;
  document.getElementById('qa-trainers').textContent = tCount;
  document.getElementById('qa-courses').textContent  = cCount;

  // Classes list
  const clList = document.getElementById('classes-list');
  if (classesRes.status === 'fulfilled' && classesRes.value.results.length) {
    clList.innerHTML = classesRes.value.results.map(cl => `
      <a class="item-row" href="classes.html">
        <div class="item-row__icon" style="background:var(--color-blue-bg)">
          <svg width="13" height="13" style="color:var(--color-blue)"><use href="#icon-classes"/></svg>
        </div>
        <div class="item-row__body">
          <div class="item-row__title">${cl.name}</div>
          <div class="item-row__sub">${cl.course_name ?? cl.course?.name ?? '—'} · ${cl.trainer_name ?? cl.trainer?.full_name ?? '—'}</div>
        </div>
        <div class="item-row__right">${classBadge(cl.status)}</div>
      </a>`).join('');
  } else {
    clList.innerHTML = `
      <div class="card-empty">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
          <path d="M1.5 7h13"/>
        </svg>
        <p>${t('dash.empty.classes')}</p>
      </div>`;
  }
}


// ══════════════════════════════════════════════════════
//  TRAINER DASHBOARD
// ══════════════════════════════════════════════════════
async function renderTrainer() {
  const name = displayName(user);

  root.innerHTML = `
    <div class="page-header">
      <div class="page-header__left">
        <h1 class="page-header__title">${greeting()}, <span class="greeting-name">${name}</span></h1>
        <p class="page-header__subtitle">${t('dash.subtitle.trainer')}</p>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      ${statSkeleton('green')}${statSkeleton('blue')}
      ${statSkeleton('amber')}${statSkeleton('gray')}
    </div>

    <div class="dash-grid">
      <div>
        <div class="section-label">${t('dash.section.myClasses')}</div>
        <div class="card" style="overflow:hidden">
          <div class="item-list" id="my-classes">${itemSkeletons(4)}</div>
          <div class="card-footer" style="display:flex;justify-content:flex-end">
            <a href="classes.html" class="btn btn-ghost btn-sm">${t('dash.viewAll')}</a>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">${t('dash.section.myStudents')}</div>
        <div class="card" style="overflow:hidden">
          <div class="item-list" id="my-students">${itemSkeletons(4)}</div>
        </div>
      </div>
    </div>`;

  // Load trainer profile + classes in parallel
  const [profileRes, classesRes, studentsRes] = await Promise.allSettled([
    trainers.me(),
    classes.list({ page_size: 20 }),
    students.list({ page_size: 5, is_active: true }),
  ]);

  const myProfile = profileRes.status === 'fulfilled' ? profileRes.value : null;
  const myClasses = classesRes.status === 'fulfilled' ? classesRes.value.results : [];
  const myStudents = studentsRes.status === 'fulfilled' ? studentsRes.value.results : [];

  const openCount      = myClasses.filter(c => c.status === 'open').length;
  const inProgressCount = myClasses.filter(c => c.status === 'in_progress').length;
  const closedCount    = myClasses.filter(c => c.status === 'closed').length;
  const totalStudents  = studentsRes.status === 'fulfilled' ? studentsRes.value.count : '—';

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card stat-accent-green">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-classes"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.myClasses')}</div>
      <div class="stat-card__value">${myClasses.length}</div>
      <div class="stat-card__delta">${t('dash.stat.myClasses.delta')}</div>
    </div>
    <div class="stat-card stat-accent-blue">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-students"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.students')}</div>
      <div class="stat-card__value">${totalStudents}</div>
      <div class="stat-card__delta">${t('dash.stat.studentsInst.delta')}</div>
    </div>
    <div class="stat-card stat-accent-amber">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-dashboard"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.inProgress')}</div>
      <div class="stat-card__value">${inProgressCount}</div>
      <div class="stat-card__delta">${t('dash.stat.inProgress.delta')}</div>
    </div>
    <div class="stat-card stat-accent-gray">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-grades"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.openClasses')}</div>
      <div class="stat-card__value">${openCount}</div>
      <div class="stat-card__delta">${t('dash.stat.openClasses.delta')}</div>
    </div>`;

  // My classes list
  const classList = document.getElementById('my-classes');
  if (myClasses.length) {
    classList.innerHTML = myClasses.slice(0, 6).map(cl => `
      <a class="item-row" href="classes.html">
        <div class="item-row__icon" style="background:var(--color-green-bg)">
          <svg width="13" height="13" style="color:var(--color-green)"><use href="#icon-classes"/></svg>
        </div>
        <div class="item-row__body">
          <div class="item-row__title">${cl.name}</div>
          <div class="item-row__sub">
            ${cl.course_name ?? cl.course?.name ?? '—'} ·
            ${cl.start_date ?? ''} → ${cl.end_date ?? ''}
          </div>
        </div>
        <div class="item-row__right">${classBadge(cl.status)}</div>
      </a>`).join('');
  } else {
    classList.innerHTML = `
      <div class="card-empty">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
          <path d="M1.5 7h13"/>
        </svg>
        <p>${t('dash.empty.myClasses')}</p>
      </div>`;
  }

  // My students list
  const studentList = document.getElementById('my-students');
  if (myStudents.length) {
    studentList.innerHTML = myStudents.map(s => `
      <div class="item-row">
        <div class="item-row__icon" style="background:var(--color-blue-bg)">
          <svg width="13" height="13" style="color:var(--color-blue)"><use href="#icon-students"/></svg>
        </div>
        <div class="item-row__body">
          <div class="item-row__title">${s.full_name}</div>
          <div class="item-row__sub">${s.student_code}</div>
        </div>
        <div class="item-row__right">
          <span class="badge ${s.is_active ? 'badge-green' : 'badge-red'}">
            ${s.is_active ? t('ui.active') : t('ui.inactive')}
          </span>
        </div>
      </div>`).join('');
  } else {
    studentList.innerHTML = `
      <div class="card-empty">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
          <path d="M2 14c0-3.314 2.686-5 6-5s6 1.686 6 5"/>
        </svg>
        <p>${t('dash.empty.students')}</p>
      </div>`;
  }
}


// ══════════════════════════════════════════════════════
//  STUDENT DASHBOARD
// ══════════════════════════════════════════════════════
async function renderStudent() {
  const name = displayName(user);

  root.innerHTML = `
    <div class="page-header">
      <div class="page-header__left">
        <h1 class="page-header__title">${greeting()}, <span class="greeting-name">${name}</span></h1>
        <p class="page-header__subtitle">${t('dash.subtitle.student')}</p>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      ${statSkeleton('blue')}${statSkeleton('green')}
      ${statSkeleton('amber')}${statSkeleton('gray')}
    </div>

    <div class="dash-grid">
      <div>
        <div class="section-label">${t('dash.section.myEnrolments')}</div>
        <div class="card" style="overflow:hidden">
          <div class="item-list" id="enrolment-list">${itemSkeletons(4)}</div>
          <div class="card-footer" style="display:flex;justify-content:flex-end">
            <a href="classes.html" class="btn btn-ghost btn-sm">${t('dash.allEnrolments')}</a>
          </div>
        </div>
      </div>

      <div>
        <div class="section-label">${t('dash.section.myGrades')}</div>
        <div class="card" style="overflow:hidden">
          <div class="item-list" id="grade-list">${itemSkeletons(4)}</div>
          <div class="card-footer" style="display:flex;justify-content:flex-end">
            <a href="grades.html" class="btn btn-ghost btn-sm">${t('dash.allGrades')}</a>
          </div>
        </div>
      </div>
    </div>`;

  // Load enrolments + grades in parallel
  const [enrolRes, gradeRes] = await Promise.allSettled([
    classes.myEnrollments({ page_size: 20 }),
    grades.myGrades(),
  ]);

  const enrolments = enrolRes.status === 'fulfilled' ? enrolRes.value.results : [];
  const gradeGroups = gradeRes.status === 'fulfilled'
    ? (Array.isArray(gradeRes.value) ? gradeRes.value : gradeRes.value.results ?? [])
    : [];

  const activeCount    = enrolments.filter(e => e.status === 'active').length;
  const completedCount = enrolments.filter(e => e.status === 'completed').length;
  const droppedCount   = enrolments.filter(e => e.status === 'dropped').length;

  // Calculate overall average from grade groups
  const validAvgs = gradeGroups
    .map(g => parseFloat(g.average))
    .filter(v => !isNaN(v));
  const overallAvg = validAvgs.length
    ? (validAvgs.reduce((a, b) => a + b, 0) / validAvgs.length).toFixed(1)
    : '—';

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card stat-accent-blue">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-classes"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.enrolments')}</div>
      <div class="stat-card__value">${enrolments.length}</div>
      <div class="stat-card__delta">${t('dash.stat.enrolments.delta')}</div>
    </div>
    <div class="stat-card stat-accent-green">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-check"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.completed')}</div>
      <div class="stat-card__value">${completedCount}</div>
      <div class="stat-card__delta">${t('dash.stat.completed.delta')}</div>
    </div>
    <div class="stat-card stat-accent-amber">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-grades"/></svg>
      </div>
      <div class="stat-card__label">${t('dash.stat.overallAvg')}</div>
      <div class="stat-card__value">${overallAvg}${overallAvg !== '—' ? '<span style="font-size:14px;font-weight:400;color:var(--text-tertiary)">/20</span>' : ''}</div>
      <div class="stat-card__delta">${t('dash.stat.overallAvg.delta')}</div>
    </div>
    <div class="stat-card stat-accent-gray">
      <div class="stat-card__icon">
        <svg width="16" height="16"><use href="#icon-dashboard"/></svg>
      </div>
      <div class="stat-card__label">${t('ui.active')}</div>
      <div class="stat-card__value">${activeCount}</div>
      <div class="stat-card__delta">${t('dash.stat.active.delta')}</div>
    </div>`;

  // Enrolment list
  const enrolList = document.getElementById('enrolment-list');
  if (enrolments.length) {
    const statusMap = {
      active:    ['badge-blue',  t('dash.enrol.active')],
      completed: ['badge-green', t('dash.enrol.completed')],
      dropped:   ['badge-red',   t('dash.enrol.dropped')],
    };
    enrolList.innerHTML = enrolments.slice(0, 6).map(e => {
      const [badgeCls, badgeLabel] = statusMap[e.status] ?? ['badge-gray', e.status];
      return `
        <div class="item-row">
          <div class="item-row__icon" style="background:var(--color-blue-bg)">
            <svg width="13" height="13" style="color:var(--color-blue)"><use href="#icon-classes"/></svg>
          </div>
          <div class="item-row__body">
            <div class="item-row__title">${e.class_name ?? '—'}</div>
            <div class="item-row__sub">${e.course_name ?? '—'} · ${e.trainer_name ?? '—'}</div>
          </div>
          <div class="item-row__right">
            <span class="badge ${badgeCls}">${badgeLabel}</span>
          </div>
        </div>`;
    }).join('');
  } else {
    enrolList.innerHTML = `
      <div class="card-empty">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
          <path d="M1.5 7h13"/>
        </svg>
        <p>${t('dash.empty.enrolments')}</p>
      </div>`;
  }

  // Grades list — grouped by class with grade bar
  const gradeList = document.getElementById('grade-list');
  if (gradeGroups.length) {
    gradeList.innerHTML = gradeGroups.slice(0, 5).map(g => {
      const avg  = parseFloat(g.average) || 0;
      const pct  = Math.min((avg / 20) * 100, 100);
      const cls  = gradeBarClass(pct);
      return `
        <div class="item-row" style="flex-direction:column;align-items:stretch;gap:6px">
          <div style="display:flex;align-items:center;justify-content:space-between">
            <div class="item-row__title" style="font-size:13px">${g.class_name}</div>
            <span style="font-size:11px;color:var(--text-tertiary)">${g.course_name ?? ''}</span>
          </div>
          <div class="grade-bar-wrap">
            <div class="grade-bar-track">
              <div class="grade-bar-fill ${cls}" style="width:${pct}%"></div>
            </div>
            <span class="grade-value">${avg.toFixed(1)}/20</span>
          </div>
        </div>`;
    }).join('');
  } else {
    gradeList.innerHTML = `
      <div class="card-empty">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M8 1.5 10 6h4.5L11 9l1.5 4.5L8 11l-4.5 2.5L5 9 1.5 6H6L8 1.5Z"/>
        </svg>
        <p>${t('dash.empty.grades')}</p>
      </div>`;
  }
}


// ══════════════════════════════════════════════════════
//  Role router
// ══════════════════════════════════════════════════════
async function rerenderDashboard() {
  setBreadcrumb([{ label: t('dash.title'), current: true }]);
  try {
    switch (user.role) {
      case 'admin':   await renderAdmin();   break;
      case 'trainer': await renderTrainer(); break;
      case 'student': await renderStudent(); break;
      default:        await renderAdmin();
    }
  } catch (err) {
    console.error('Dashboard error:', err);
    root.innerHTML = `
      <div class="empty-state" style="margin-top:var(--sp-16)">
        <svg class="empty-state__icon" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <circle cx="8" cy="8" r="6.5"/>
          <path d="M8 5v3.5M8 11v.5"/>
        </svg>
        <div class="empty-state__title">${t('dash.error.title')}</div>
        <p class="empty-state__desc">${err.message ?? t('ui.error.generic')}</p>
        <button class="btn btn-secondary mt-4" onclick="location.reload()">${t('ui.tryAgain')}</button>
      </div>`;
  }
}

rerenderDashboard();
window.addEventListener('localechange', () => rerenderDashboard());
</script>

</body>
</html>
