<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Change Password — Acadêmico</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-canvas:      #F7F6F3;
      --bg-surface:     #FFFFFF;
      --bg-raised:      #F0EEE9;
      --text-primary:   #181714;
      --text-secondary: #6B6860;
      --text-tertiary:  #9C9A93;
      --text-inverse:   #F5F3EE;
      --border-default: #E4E2DC;
      --border-strong:  #C8C5BC;
      --border-focus:   #181714;
      --color-red:      #C0392B;
      --color-red-bg:   #FDECEA;
      --color-green:    #27AE60;
      --color-amber:    #E8A838;
      --sidebar-bg:     #1C1B18;
      --font-ui: 'DM Sans', system-ui, sans-serif;
      --radius-md: 6px;
      --shadow-lg: 0 12px 28px rgba(0,0,0,0.12), 0 4px 8px rgba(0,0,0,0.06);
      --transition-fast: 120ms ease;
      --transition-base: 200ms ease;
    }

    html { font-size: 14px; -webkit-font-smoothing: antialiased; }
    body {
      font-family: var(--font-ui);
      background: var(--bg-canvas);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      box-shadow: var(--shadow-lg);
      padding: 40px 36px;
    }

    .card__logo {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 32px;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--sidebar-bg);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo-mark svg { width: 14px; height: 14px; color: var(--color-amber); }
    .logo-word { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }

    .card__title {
      font-size: 20px; font-weight: 600;
      letter-spacing: -0.3px; margin-bottom: 6px;
    }
    .card__subtitle {
      font-size: 13px; color: var(--text-secondary);
      line-height: 1.55; margin-bottom: 28px;
    }

    .notice {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px;
      background: #FFF8EC;
      border: 1px solid #F3D68A;
      border-radius: var(--radius-md);
      font-size: 12.5px; color: #7A5A00;
      line-height: 1.5; margin-bottom: 22px;
    }
    .notice svg { width: 14px; height: 14px; flex-shrink: 0; margin-top: 1px; }
    .notice.hidden { display: none; }

    .form { display: flex; flex-direction: column; gap: 16px; }

    .form-group { display: flex; flex-direction: column; gap: 5px; }
    .form-label { font-size: 13px; font-weight: 500; }

    .input-wrapper { position: relative; }
    .form-input {
      width: 100%; height: 40px;
      padding: 0 40px 0 12px;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--font-ui); font-size: 14px;
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .form-input:hover  { border-color: var(--border-strong); }
    .form-input:focus  { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(24,23,20,0.08); }
    .form-input.error  { border-color: var(--color-red); }
    .form-input.error:focus { box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }

    .input-toggle {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none; cursor: pointer;
      color: var(--text-tertiary); padding: 4px;
      display: flex; align-items: center;
      transition: color var(--transition-fast); border-radius: 4px;
    }
    .input-toggle:hover { color: var(--text-primary); }
    .input-toggle svg { width: 15px; height: 15px; display: block; }

    .field-error { font-size: 12px; color: var(--color-red); display: none; }
    .field-error.visible { display: block; }

    .alert {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13px; line-height: 1.5;
      opacity: 0; max-height: 0; overflow: hidden;
      transition: opacity var(--transition-base), max-height var(--transition-base);
    }
    .alert.visible { opacity: 1; max-height: 80px; }
    .alert-error { background: var(--color-red-bg); border: 1px solid #F5C0BB; color: var(--color-red); }
    .alert-success { background: #EAF7EF; border: 1px solid #A8DDB9; color: #1D7A44; }
    .alert svg { width: 15px; height: 15px; flex-shrink: 0; margin-top: 1px; }

    .btn-submit {
      width: 100%; height: 42px;
      background: var(--text-primary); color: var(--text-inverse);
      border: none; border-radius: var(--radius-md);
      font-family: var(--font-ui); font-size: 14px; font-weight: 500;
      cursor: pointer;
      transition: background var(--transition-fast), opacity var(--transition-fast);
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }
    .btn-submit:hover:not(:disabled) { background: #2C2B27; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(245,243,238,0.3);
      border-top-color: var(--text-inverse);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none; flex-shrink: 0;
    }
    .btn-submit.loading .spinner { display: block; }
    .btn-submit.loading .btn-label { opacity: 0.6; }

    .card__footer {
      margin-top: 20px; text-align: center;
      font-size: 12px; color: var(--text-tertiary);
    }
    .card__footer a { color: var(--text-secondary); text-decoration: none; }
    .card__footer a:hover { color: var(--text-primary); text-decoration: underline; }
  </style>
</head>
<body>

<div class="card">
  <div class="card__logo">
    <div class="logo-mark">
      <svg viewBox="0 0 14 14" fill="none">
        <path d="M7 1L12.5 4V10L7 13L1.5 10V4L7 1Z" fill="currentColor"/>
      </svg>
    </div>
    <span class="logo-word">Acadêmico</span>
  </div>

  <h1 class="card__title">Change your password</h1>
  <p class="card__subtitle" id="card-subtitle">
    Set a new password for your account.
  </p>

  <!-- Shown when user was forced here on first login -->
  <div class="notice" id="forced-notice">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round">
      <circle cx="8" cy="8" r="6.5"/>
      <path d="M8 5v3.5M8 11v.5"/>
    </svg>
    Your account requires a password change before you can continue.
  </div>

  <div class="alert alert-error" id="alert-error" role="alert">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <circle cx="8" cy="8" r="6.5"/>
      <path d="M8 5v3.5M8 11v.5"/>
    </svg>
    <span id="alert-error-text"></span>
  </div>

  <div class="alert alert-success" id="alert-success" role="status">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M2.5 8.5l3.5 3.5 7-7"/>
    </svg>
    <span>Password changed. Redirecting…</span>
  </div>

  <form class="form" id="change-form" novalidate>
    <div class="form-group">
      <label class="form-label" for="old-pw">Current password</label>
      <div class="input-wrapper">
        <input class="form-input" type="password" id="old-pw" autocomplete="current-password" required/>
        <button type="button" class="input-toggle" data-target="old-pw" aria-label="Toggle visibility">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5Z"/>
            <circle cx="8" cy="8" r="2"/>
          </svg>
        </button>
      </div>
      <span class="field-error" id="e-old">Current password is required.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="new-pw">New password</label>
      <div class="input-wrapper">
        <input class="form-input" type="password" id="new-pw" autocomplete="new-password" required/>
        <button type="button" class="input-toggle" data-target="new-pw" aria-label="Toggle visibility">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5Z"/>
            <circle cx="8" cy="8" r="2"/>
          </svg>
        </button>
      </div>
      <span class="field-error" id="e-new">Minimum 8 characters.</span>
    </div>

    <div class="form-group">
      <label class="form-label" for="confirm-pw">Confirm new password</label>
      <div class="input-wrapper">
        <input class="form-input" type="password" id="confirm-pw" autocomplete="new-password" required/>
        <button type="button" class="input-toggle" data-target="confirm-pw" aria-label="Toggle visibility">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"
               stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 8s2.5-5 7-5 7 5 7 5-2.5 5-7 5-7-5-7-5Z"/>
            <circle cx="8" cy="8" r="2"/>
          </svg>
        </button>
      </div>
      <span class="field-error" id="e-confirm">Passwords do not match.</span>
    </div>

    <button type="submit" class="btn-submit" id="submit-btn">
      <div class="spinner" aria-hidden="true"></div>
      <span class="btn-label">Change password</span>
    </button>
  </form>

  <p class="card__footer" id="skip-link">
    <a href="./dashboard.html">Skip for now</a>
  </p>
</div>

<script type="module">
  import { session, auth } from '../js/api.js';

  // ── Guard: must be logged in ──────────────────────────
  if (!session.isLoggedIn()) {
    window.location.href = './login.html';
  }

  const user = session.getUser();
  const mustChange = user?.must_change_password ?? false;

  // Hide the "skip" link if password change is required
  if (mustChange) {
    document.getElementById('skip-link').style.display = 'none';
  } else {
    document.getElementById('forced-notice').classList.add('hidden');
    document.getElementById('card-subtitle').textContent =
      'Update your account password below.';
  }

  // ── Password visibility toggles ───────────────────────
  document.querySelectorAll('.input-toggle').forEach(btn => {
    btn.addEventListener('click', () => {
      const input = document.getElementById(btn.dataset.target);
      input.type = input.type === 'password' ? 'text' : 'password';
    });
  });

  // ── Elements ──────────────────────────────────────────
  const oldPw     = document.getElementById('old-pw');
  const newPw     = document.getElementById('new-pw');
  const confirmPw = document.getElementById('confirm-pw');
  const submitBtn = document.getElementById('submit-btn');
  const alertErr  = document.getElementById('alert-error');
  const alertErrT = document.getElementById('alert-error-text');
  const alertOk   = document.getElementById('alert-success');

  function showError(msg) {
    alertErrT.textContent = msg;
    alertErr.classList.add('visible');
    alertOk.classList.remove('visible');
  }
  function hideError() { alertErr.classList.remove('visible'); }

  function fieldError(inputId, errId, show) {
    document.getElementById(inputId).classList.toggle('error', show);
    document.getElementById(errId).classList.toggle('visible', show);
  }

  [oldPw, newPw, confirmPw].forEach(el => el.addEventListener('input', hideError));

  // ── Submit ────────────────────────────────────────────
  document.getElementById('change-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();

    const oldVal     = oldPw.value;
    const newVal     = newPw.value;
    const confirmVal = confirmPw.value;

    let valid = true;
    fieldError('old-pw',     'e-old',     !oldVal);    if (!oldVal) valid = false;
    fieldError('new-pw',     'e-new',     newVal.length < 8);  if (newVal.length < 8) valid = false;
    fieldError('confirm-pw', 'e-confirm', newVal !== confirmVal); if (newVal !== confirmVal) valid = false;
    if (!valid) return;

    submitBtn.disabled = true;
    submitBtn.classList.add('loading');

    try {
      await auth.changePassword(oldVal, newVal);

      // Clear the flag from the stored user object
      const storedUser = session.getUser();
      if (storedUser) {
        storedUser.must_change_password = false;
        localStorage.setItem('user', JSON.stringify(storedUser));
      }

      alertOk.classList.add('visible');
      setTimeout(() => { window.location.href = './dashboard.html'; }, 1500);

    } catch (err) {
      submitBtn.disabled = false;
      submitBtn.classList.remove('loading');
      showError(err.detail ?? 'Something went wrong. Please try again.');
    }
  });
</script>

</body>
</html>
