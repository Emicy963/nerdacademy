<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Courses — Matrika</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/global.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <style>
    /* ── View toggle (grid / list) ─────────────────── */
    .view-toggle {
      display: flex;
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md);
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }
    .view-btn {
      width: 32px; height: 32px;
      border: none; background: var(--bg-surface);
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      color: var(--text-tertiary);
      transition: background var(--transition-fast), color var(--transition-fast);
    }
    .view-btn + .view-btn { border-left: 1px solid var(--border-default); }
    .view-btn.active {
      background: var(--bg-raised);
      color: var(--text-primary);
    }
    .view-btn svg { width: 14px; height: 14px; }

    /* ── Card grid ─────────────────────────────────── */
    .course-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: var(--sp-4);
    }
    @media (max-width: 640px) { .course-grid { grid-template-columns: 1fr; } }

    .course-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      transition: border-color var(--transition-fast),
                  box-shadow var(--transition-fast),
                  transform var(--transition-fast);
      position: relative;
      overflow: hidden;
    }
    .course-card:hover {
      border-color: var(--border-strong);
      box-shadow: var(--shadow-md);
      transform: translateY(-1px);
    }
    .course-card.selected {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(24,23,20,0.07), var(--shadow-sm);
    }

    /* Colour stripe on top of card */
    .course-card__stripe {
      height: 3px;
      background: var(--color-amber);
      flex-shrink: 0;
    }
    .course-card.inactive .course-card__stripe { background: var(--border-default); }

    .course-card__body {
      padding: var(--sp-5);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: var(--sp-3);
    }

    .course-card__top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--sp-2);
    }

    .course-card__code {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 500;
      color: var(--text-tertiary);
      letter-spacing: 0.04em;
      background: var(--bg-raised);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
    }

    .course-card__name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
      line-height: 1.35;
      letter-spacing: -0.1px;
    }

    .course-card__desc {
      font-size: 12.5px;
      color: var(--text-tertiary);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .course-card__meta {
      display: flex;
      align-items: center;
      gap: var(--sp-4);
      margin-top: auto;
      padding-top: var(--sp-3);
      border-top: 1px solid var(--border-default);
    }

    .course-card__meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .course-card__meta-item svg { width: 12px; height: 12px; color: var(--text-tertiary); }

    /* Admin action menu on card */
    .course-card__actions {
      position: absolute;
      top: var(--sp-3);
      right: var(--sp-3);
      display: flex;
      gap: 2px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .course-card:hover .course-card__actions { opacity: 1; }

    /* ── List view ─────────────────────────────────── */
    .course-list-view { display: flex; flex-direction: column; }

    /* ── Skeleton card ─────────────────────────────── */
    .course-card--skeleton {
      pointer-events: none;
      cursor: default;
    }
    .course-card--skeleton:hover {
      transform: none;
      border-color: var(--border-default);
      box-shadow: var(--shadow-sm);
    }

    /* ── Detail panel ──────────────────────────────── */
    .detail-panel {
      position: fixed;
      top: 0; right: 0;
      height: 100vh; width: 400px;
      background: var(--bg-surface);
      border-left: 1px solid var(--border-default);
      box-shadow: var(--shadow-lg);
      z-index: 300;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform var(--transition-base);
    }
    .detail-panel.open { transform: translateX(0); }

    .detail-panel__header {
      display: flex; align-items: flex-start;
      justify-content: space-between;
      padding: var(--sp-5) var(--sp-6);
      border-bottom: 1px solid var(--border-default);
      flex-shrink: 0;
    }
    .detail-panel__body {
      flex: 1; overflow-y: auto;
      display: flex; flex-direction: column;
    }
    .detail-panel__footer {
      padding: var(--sp-4) var(--sp-6);
      border-top: 1px solid var(--border-default);
      display: flex; gap: var(--sp-2); flex-shrink: 0;
    }

    /* Panel tabs */
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border-default);
      padding: 0 var(--sp-6);
      flex-shrink: 0;
    }
    .panel-tab {
      height: 40px; padding: 0 var(--sp-1);
      margin-right: var(--sp-5);
      font-size: 13px; font-weight: 500;
      color: var(--text-tertiary);
      cursor: pointer; border: none;
      background: none;
      border-bottom: 2px solid transparent;
      transition: color var(--transition-fast), border-color var(--transition-fast);
    }
    .panel-tab:hover  { color: var(--text-primary); }
    .panel-tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }

    .panel-tab-content {
      display: none; padding: var(--sp-6);
      flex-direction: column; gap: var(--sp-5); flex: 1;
    }
    .panel-tab-content.active { display: flex; }

    .detail-field__label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-tertiary); margin-bottom: var(--sp-1);
    }
    .detail-field__value {
      font-size: 14px; color: var(--text-primary); line-height: 1.6;
    }
    .detail-field__empty { font-size: 13px; color: var(--text-tertiary); font-style: italic; }

    /* Classes inside panel */
    .class-mini-list { display: flex; flex-direction: column; gap: var(--sp-2); }
    .class-mini-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--sp-3) var(--sp-4);
      background: var(--bg-canvas);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-md); font-size: 13px;
    }
    .class-mini-item__name { font-weight: 500; color: var(--text-primary); }
    .class-mini-item__sub  { font-size: 11px; color: var(--text-tertiary); margin-top: 1px; }

    /* ── Panel backdrop ────────────────────────────── */
    .panel-backdrop { position: fixed; inset: 0; z-index: 299; display: none; }
    .panel-backdrop.open { display: block; }

    /* ── Modal ─────────────────────────────────────── */
    .form-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: var(--sp-4);
    }
    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    /* ── Toast ─────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 24px; right: 24px; z-index: 999;
      background: var(--text-primary); color: var(--text-inverse);
      padding: 10px 16px; border-radius: var(--radius-lg);
      font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg);
      display: flex; align-items: center; gap: var(--sp-2);
      transform: translateY(8px); opacity: 0;
      transition: opacity var(--transition-base), transform var(--transition-base);
      pointer-events: none;
    }
    .toast.visible { opacity: 1; transform: translateY(0); }
    .toast.error   { background: var(--color-red); }

    /* ── Skeleton ──────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }
    .skel {
      display: inline-block; border-radius: var(--radius-sm);
      background: linear-gradient(
        90deg, var(--bg-raised) 25%, var(--border-default) 50%, var(--bg-raised) 75%
      );
      background-size: 600px 100%;
      animation: shimmer 1.4s ease-in-out infinite;
    }

    /* ── Filter pill ───────────────────────────────── */
    .filter-pill {
      display: inline-flex; align-items: center; gap: var(--sp-1);
      height: 26px; padding: 0 var(--sp-2) 0 var(--sp-3);
      background: var(--text-primary); color: var(--text-inverse);
      border-radius: 99px; font-size: 12px; font-weight: 500;
    }
    .filter-pill button {
      background: none; border: none; cursor: pointer;
      color: var(--text-inverse); opacity: 0.7;
      display: flex; padding: 2px; border-radius: 50%;
    }
    .filter-pill button:hover { opacity: 1; }
  </style>
</head>
<body>

<div id="icon-sprite" style="display:none"></div>
<div id="sidebar-backdrop"
     style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:199;"
     onclick="document.getElementById('sidebar').classList.remove('open')"></div>

<div class="app">

  <!-- ── Sidebar ──────────────────────────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__brand">
      <div class="sidebar__logo">
        <svg viewBox="0 0 14 14" fill="none" width="14" height="14">
          <path d="M7 1L12.5 4V10L7 13L1.5 10V4L7 1Z" fill="currentColor"/>
        </svg>
      </div>
      <span class="sidebar__name">Matrika</span>
      <span class="sidebar__edition">Beta</span>
    </div>
    <nav class="sidebar__nav" id="sidebar-nav"></nav>
    <div id="sidebar-institution-switcher"></div>
    <div class="sidebar__footer">
      <div class="sidebar__user">
        <div class="sidebar__avatar" id="sidebar-avatar">--</div>
        <div class="sidebar__user-info">
          <div class="sidebar__user-name" id="sidebar-user-name">Loading…</div>
          <div class="sidebar__user-role"  id="sidebar-user-role">—</div>
        </div>
        <button class="sidebar__logout" id="logout-btn" title="Sign out">
          <svg width="16" height="16"><use href="#icon-logout"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <!-- ── Main ─────────────────────────────────────── -->
  <div class="main">
    <header class="topbar">
      <button class="topbar__icon-btn" id="menu-toggle" aria-label="Menu" style="display:none">
        <svg width="16" height="16"><use href="#icon-menu"/></svg>
      </button>
      <nav class="topbar__breadcrumb" id="topbar-breadcrumb"></nav>
      <label class="topbar__search">
        <svg width="14" height="14"><use href="#icon-search"/></svg>
        <input type="search" data-i18n-placeholder="ui.searchTopbar"
               placeholder="Pesquisar…" autocomplete="off"/>
      </label>
      <div class="topbar__actions">
        <button class="topbar__icon-btn" data-i18n-title="ui.notifications"
                aria-label="Notifications">
          <svg width="16" height="16"><use href="#icon-bell"/></svg>
        </button>
      </div>
    </header>

    <main class="page">

      <div class="page-header">
        <div class="page-header__left">
          <h1 class="page-header__title" data-i18n="courses.title">Cursos</h1>
          <p class="page-header__subtitle" id="subtitle">Loading…</p>
        </div>
        <div class="page-header__actions" id="header-actions">
          <!-- role-injected -->
        </div>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <label class="toolbar__search">
          <svg width="14" height="14"><use href="#icon-search"/></svg>
          <input type="text" id="search-input"
                 data-i18n-placeholder="courses.search"
                 placeholder="Pesquisar por nome ou código…" autocomplete="off"/>
        </label>

        <select class="form-select" id="filter-status"
                style="width:140px;height:34px;box-shadow:var(--shadow-sm)">
          <option value=""     data-i18n="courses.filter.all">Todos os cursos</option>
          <option value="true"  data-i18n="ui.activeOnly">Apenas activos</option>
          <option value="false" data-i18n="ui.inactiveOnly">Apenas inactivos</option>
        </select>

        <div class="toolbar__spacer"></div>
        <span id="filter-pills" style="display:flex;gap:var(--sp-2)"></span>

        <!-- View toggle -->
        <div class="view-toggle">
          <button class="view-btn active" id="view-grid" title="Grid view" aria-label="Grid view">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="1.5" y="1.5" width="5" height="5" rx="1"/>
              <rect x="9.5" y="1.5" width="5" height="5" rx="1"/>
              <rect x="1.5" y="9.5" width="5" height="5" rx="1"/>
              <rect x="9.5" y="9.5" width="5" height="5" rx="1"/>
            </svg>
          </button>
          <button class="view-btn" id="view-list" title="List view" aria-label="List view">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round">
              <path d="M2 4h12M2 8h12M2 12h12"/>
            </svg>
          </button>
        </div>
      </div>

      <!-- Content area: grid or list -->
      <div id="content-area">
        <!-- skeleton cards on first load -->
        <div class="course-grid" id="courses-grid">
          ${[1,2,3,4,5,6].map(() => `
            <div class="course-card course-card--skeleton">
              <div class="course-card__stripe"></div>
              <div class="course-card__body" style="gap:12px">
                <div style="display:flex;justify-content:space-between;align-items:center">
                  <div class="skel" style="height:18px;width:50px;border-radius:3px"></div>
                  <div class="skel" style="height:18px;width:48px;border-radius:99px"></div>
                </div>
                <div class="skel" style="height:16px;width:75%"></div>
                <div class="skel" style="height:12px;width:90%"></div>
                <div class="skel" style="height:12px;width:65%"></div>
                <div style="display:flex;gap:16px;padding-top:12px;border-top:1px solid var(--border-default)">
                  <div class="skel" style="height:12px;width:60px"></div>
                  <div class="skel" style="height:12px;width:50px"></div>
                </div>
              </div>
            </div>`).join('')}
        </div>
      </div>

      <!-- Pagination -->
      <div class="pagination" id="pagination" style="display:none;margin-top:var(--sp-4);
           background:var(--bg-surface);border:1px solid var(--border-default);
           border-radius:var(--radius-lg)">
        <span class="pagination__info" id="pagination-info"></span>
        <div class="pagination__controls" id="pagination-controls"></div>
      </div>

    </main>
  </div>
</div>

<!-- ── Detail panel ───────────────────────────────── -->
<div class="panel-backdrop" id="panel-backdrop"></div>
<aside class="detail-panel" id="detail-panel" aria-label="Course details">
  <div class="detail-panel__header">
    <div style="flex:1;min-width:0">
      <div style="display:flex;align-items:center;gap:var(--sp-2);margin-bottom:3px">
        <span style="font-family:var(--font-mono);font-size:11px;font-weight:500;
                     color:var(--text-tertiary);background:var(--bg-raised);
                     padding:2px 6px;border-radius:3px" id="panel-code">—</span>
        <span id="panel-status-badge"></span>
      </div>
      <div class="t-heading" id="panel-name" style="white-space:nowrap;overflow:hidden;
           text-overflow:ellipsis">—</div>
    </div>
    <button class="btn btn-ghost btn-icon" id="panel-close" aria-label="Close">
      <svg width="14" height="14"><use href="#icon-close"/></svg>
    </button>
  </div>

  <div class="panel-tabs">
    <button class="panel-tab active" data-tab="info">Details</button>
    <button class="panel-tab"        data-tab="classes">Classes</button>
  </div>

  <div class="panel-tab-content active" id="tab-info"></div>
  <div class="panel-tab-content"        id="tab-classes"></div>

  <div class="detail-panel__footer" id="panel-footer"></div>
</aside>

<!-- ── Create / Edit modal ───────────────────────── -->
<div class="modal-backdrop" id="modal" role="dialog" aria-modal="true"
     aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <h2 class="t-heading" id="modal-title">New course</h2>
      <button class="btn btn-ghost btn-icon" id="modal-close" aria-label="Close">
        <svg width="14" height="14"><use href="#icon-close"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group" style="grid-column:1/-1">
          <label class="form-label" for="f-name">
            Course name <span style="color:var(--color-red)">*</span>
          </label>
          <input class="form-input" type="text" id="f-name"
                 placeholder="Web Development" autocomplete="off"/>
          <span class="form-error" id="e-name"></span>
        </div>
        <div class="form-group" id="code-group">
          <label class="form-label" for="f-code">
            Code <span style="color:var(--color-red)">*</span>
          </label>
          <input class="form-input" type="text" id="f-code"
                 placeholder="WD-2024"
                 style="font-family:var(--font-mono);text-transform:uppercase"
                 autocomplete="off"/>
          <span class="form-hint">Uppercase, unique per institution.</span>
          <span class="form-error" id="e-code"></span>
        </div>
        <div class="form-group">
          <label class="form-label" for="f-hours">Total hours</label>
          <input class="form-input" type="number" id="f-hours"
                 placeholder="120" min="0" autocomplete="off"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="f-desc">Description</label>
        <textarea class="form-textarea" id="f-desc" rows="3"
                  placeholder="Brief overview of the course content…"></textarea>
      </div>
      <!-- Edit only: active toggle -->
      <div class="form-group" id="active-group" style="display:none">
        <label class="form-label">Status</label>
        <div style="display:flex;align-items:center;gap:var(--sp-3);margin-top:var(--sp-1)">
          <label style="display:flex;align-items:center;gap:var(--sp-2);cursor:pointer;font-size:13px">
            <input type="radio" name="f-active" id="f-active-yes" value="true"/> Active
          </label>
          <label style="display:flex;align-items:center;gap:var(--sp-2);cursor:pointer;font-size:13px">
            <input type="radio" name="f-active" id="f-active-no"  value="false"/> Inactive
          </label>
        </div>
      </div>
      <div class="alert alert-error" id="modal-error" style="display:none"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
      <button class="btn btn-primary"   id="modal-save">
        <span id="modal-save-label">Create course</span>
      </button>
    </div>
  </div>
</div>

<!-- ── Toast ─────────────────────────────────────── -->
<div class="toast" id="toast" role="status" aria-live="polite">
  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
       stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <use href="#icon-check"/>
  </svg>
  <span id="toast-text"></span>
</div>

<script type="module">
import { initLayout, setBreadcrumb } from '../js/layout.js';
import { courses } from '../js/api.js';

// ── Bootstrap ──────────────────────────────────────
const user = initLayout('courses');
if (!user) throw new Error('unauthenticated');

setBreadcrumb([{ label: 'Courses', current: true }]);

fetch('../components/icons.html')
  .then(r => r.text())
  .then(h => { document.getElementById('icon-sprite').innerHTML = h; });

const menuBtn = document.getElementById('menu-toggle');
const sidebar  = document.getElementById('sidebar');
menuBtn.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
window.addEventListener('resize', () => {
  menuBtn.style.display = window.innerWidth <= 900 ? 'flex' : 'none';
});
menuBtn.addEventListener('click', () => sidebar.classList.toggle('open'));

// ── Role flags ─────────────────────────────────────
const isAdmin   = user.role === 'admin';
const canWrite  = isAdmin;
const canSeeClasses = user.role === 'admin' || user.role === 'trainer';

if (canWrite) {
  document.getElementById('header-actions').innerHTML = `
    <button class="btn btn-primary" id="new-course-btn">
      <svg width="14" height="14"><use href="#icon-plus"/></svg>
      New course
    </button>`;
  document.getElementById('new-course-btn')
    .addEventListener('click', () => openModal());
}

// ── State ──────────────────────────────────────────
let currentPage    = 1;
let totalPages     = 1;
let totalCount     = 0;
let searchQuery    = '';
let filterActive   = '';
let editingId      = null;
let selectedCardId = null;
let currentView    = 'grid'; // 'grid' | 'list'
let allResults     = [];     // cached for list→grid switch
let panelCourseId  = null;

// ── Toast ──────────────────────────────────────────
let toastTimer;
function showToast(msg, isError = false) {
  const el = document.getElementById('toast');
  clearTimeout(toastTimer);
  document.getElementById('toast-text').textContent = msg;
  el.classList.toggle('error', isError);
  el.classList.add('visible');
  toastTimer = setTimeout(() => el.classList.remove('visible'), 3200);
}

// ── Helpers ────────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '—';
  try { return new Date(iso).toLocaleDateString('en-GB',
    { day: '2-digit', month: 'short', year: 'numeric' }); }
  catch { return iso; }
}
function classBadge(status) {
  const map = {
    open:        ['badge-blue',  'Open'],
    in_progress: ['badge-amber', 'In Progress'],
    closed:      ['badge-gray',  'Closed'],
  };
  const [cls, label] = map[status] ?? ['badge-gray', status];
  return `<span class="badge ${cls}">${label}</span>`;
}

// ── Load ───────────────────────────────────────────
async function loadCourses(page = 1) {
  currentPage = page;
  const params = { page, page_size: 20 };
  if (searchQuery)         params.search    = searchQuery;
  if (filterActive !== '') params.is_active = filterActive;

  try {
    const data = await courses.list(params);
    totalPages  = data.pages ?? 1;
    totalCount  = data.count ?? 0;
    allResults  = data.results ?? [];
    renderContent(allResults);
    renderPagination();
    document.getElementById('subtitle').textContent =
      `${totalCount} course${totalCount !== 1 ? 's' : ''} in your institution`;
  } catch (err) {
    renderError(err.message);
  }
}

// ── Render content (grid or list) ──────────────────
function renderContent(rows) {
  if (!rows.length) {
    document.getElementById('content-area').innerHTML = `
      <div class="empty-state" style="padding:var(--sp-16) var(--sp-8)">
        <svg class="empty-state__icon" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="1.5">
          <path d="M3 2h8a1 1 0 0 1 1 1v9l-2-1-2 1-2-1-2 1V3a1 1 0 0 1 1-1Z"/>
          <path d="M5 5.5h6M5 8h4"/>
        </svg>
        <div class="empty-state__title">No courses found</div>
        <p class="empty-state__desc">
          ${searchQuery
            ? `No results for "${searchQuery}".`
            : 'No courses have been added yet.'}
        </p>
        ${canWrite && !searchQuery
          ? `<button class="btn btn-primary mt-4"
                     onclick="document.getElementById('new-course-btn').click()">
               Add first course
             </button>`
          : ''}
      </div>`;
    return;
  }

  if (currentView === 'grid') renderGrid(rows);
  else renderList(rows);
}

// ── Grid view ──────────────────────────────────────
function renderGrid(rows) {
  document.getElementById('content-area').innerHTML =
    `<div class="course-grid" id="courses-grid"></div>`;
  const grid = document.getElementById('courses-grid');

  grid.innerHTML = rows.map(c => `
    <div class="course-card ${c.is_active ? '' : 'inactive'} ${selectedCardId === c.id ? 'selected' : ''}"
         data-id="${c.id}" tabindex="0" role="button"
         aria-label="View course ${c.name}">
      <div class="course-card__stripe"></div>
      <div class="course-card__body">
        <div class="course-card__top">
          <span class="course-card__code">${c.code}</span>
          <span class="badge ${c.is_active ? 'badge-green' : 'badge-red'}">
            ${c.is_active ? 'Active' : 'Inactive'}
          </span>
        </div>
        <div class="course-card__name">${c.name}</div>
        ${c.description
          ? `<p class="course-card__desc">${c.description}</p>`
          : `<p class="course-card__desc" style="font-style:italic">No description.</p>`}
        <div class="course-card__meta">
          <div class="course-card__meta-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round">
              <circle cx="8" cy="8" r="6.5"/>
              <path d="M8 5v3l2 2"/>
            </svg>
            ${c.total_hours ? `${c.total_hours}h` : 'No hours set'}
          </div>
          <div class="course-card__meta-item">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"
                 stroke-width="1.5" stroke-linecap="round">
              <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
              <path d="M1.5 7h13"/>
            </svg>
            Added ${fmtDate(c.created_at)}
          </div>
        </div>
      </div>
      ${canWrite ? `
      <div class="course-card__actions">
        <button class="btn btn-secondary btn-sm btn-icon edit-btn"
                data-id="${c.id}" title="Edit course"
                style="background:var(--bg-surface)">
          <svg width="12" height="12"><use href="#icon-edit"/></svg>
        </button>
      </div>` : ''}
    </div>`).join('');

  grid.querySelectorAll('.course-card').forEach(card => {
    card.addEventListener('click', e => {
      if (e.target.closest('.edit-btn')) return;
      openDetailPanel(card.dataset.id);
    });
    card.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') openDetailPanel(card.dataset.id);
    });
  });

  if (canWrite) {
    grid.querySelectorAll('.edit-btn').forEach(btn =>
      btn.addEventListener('click', () => openModal(btn.dataset.id)));
  }
}

// ── List view ──────────────────────────────────────
function renderList(rows) {
  document.getElementById('content-area').innerHTML =
    `<div class="table-wrapper"><table>
      <thead><tr>
        <th>Code</th>
        <th>Name</th>
        <th>Total hours</th>
        <th>Status</th>
        <th>Created</th>
        ${canWrite ? '<th style="width:60px"></th>' : ''}
      </tr></thead>
      <tbody id="courses-tbody"></tbody>
    </table></div>`;

  const tbody = document.getElementById('courses-tbody');
  tbody.innerHTML = rows.map(c => `
    <tr data-id="${c.id}" style="cursor:pointer">
      <td>
        <span style="font-family:var(--font-mono);font-size:12px;
                     color:var(--text-secondary)">${c.code}</span>
      </td>
      <td><span style="font-weight:500">${c.name}</span></td>
      <td style="color:var(--text-secondary);font-size:13px">
        ${c.total_hours ? `${c.total_hours}h` : '—'}
      </td>
      <td>
        <span class="badge ${c.is_active ? 'badge-green' : 'badge-red'}">
          ${c.is_active ? 'Active' : 'Inactive'}
        </span>
      </td>
      <td style="color:var(--text-tertiary);font-size:12px">${fmtDate(c.created_at)}</td>
      ${canWrite ? `
      <td>
        <div class="row-actions" style="opacity:0;transition:opacity .12s">
          <button class="btn btn-ghost btn-sm btn-icon edit-btn"
                  data-id="${c.id}" title="Edit">
            <svg width="13" height="13"><use href="#icon-edit"/></svg>
          </button>
        </div>
      </td>` : ''}
    </tr>`).join('');

  tbody.querySelectorAll('tr').forEach(tr => {
    tr.addEventListener('mouseenter', () => {
      const actions = tr.querySelector('.row-actions');
      if (actions) actions.style.opacity = '1';
    });
    tr.addEventListener('mouseleave', () => {
      const actions = tr.querySelector('.row-actions');
      if (actions) actions.style.opacity = '0';
    });
    tr.addEventListener('click', e => {
      if (e.target.closest('.edit-btn')) return;
      openDetailPanel(tr.dataset.id);
    });
  });

  if (canWrite) {
    tbody.querySelectorAll('.edit-btn').forEach(btn =>
      btn.addEventListener('click', () => openModal(btn.dataset.id)));
  }
}

function renderError(msg) {
  document.getElementById('content-area').innerHTML = `
    <div class="empty-state" style="padding:var(--sp-16) var(--sp-8)">
      <svg class="empty-state__icon" viewBox="0 0 16 16" fill="none"
           stroke="currentColor" stroke-width="1.5">
        <circle cx="8" cy="8" r="6.5"/>
        <path d="M8 5v3.5M8 11v.5"/>
      </svg>
      <div class="empty-state__title">Could not load courses</div>
      <p class="empty-state__desc">${msg}</p>
      <button class="btn btn-secondary mt-4" onclick="loadCourses()">Try again</button>
    </div>`;
}

// ── View toggle ────────────────────────────────────
document.getElementById('view-grid').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('view-grid').classList.add('active');
  document.getElementById('view-list').classList.remove('active');
  if (allResults.length) renderGrid(allResults);
});
document.getElementById('view-list').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('view-list').classList.add('active');
  document.getElementById('view-grid').classList.remove('active');
  if (allResults.length) renderList(allResults);
});

// ── Pagination ─────────────────────────────────────
function renderPagination() {
  const wrap  = document.getElementById('pagination');
  const info  = document.getElementById('pagination-info');
  const ctrls = document.getElementById('pagination-controls');
  if (totalPages <= 1 && totalCount <= 20) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'flex';
  const start = (currentPage - 1) * 20 + 1;
  const end   = Math.min(currentPage * 20, totalCount);
  info.textContent = `${start}–${end} of ${totalCount}`;
  const pages = [];
  if (totalPages <= 7) { for (let i = 1; i <= totalPages; i++) pages.push(i); }
  else {
    pages.push(1);
    if (currentPage > 3) pages.push('…');
    for (let i = Math.max(2, currentPage - 1); i <= Math.min(totalPages - 1, currentPage + 1); i++) pages.push(i);
    if (currentPage < totalPages - 2) pages.push('…');
    pages.push(totalPages);
  }
  ctrls.innerHTML = `
    <button class="pagination__btn" ${currentPage === 1 ? 'disabled' : ''}
            onclick="changePage(${currentPage - 1})">
      <svg width="12" height="12"><use href="#icon-chevron-left"/></svg>
    </button>
    ${pages.map(p =>
      p === '…'
        ? `<span style="padding:0 4px;color:var(--text-tertiary);font-size:12px">…</span>`
        : `<button class="pagination__btn ${p === currentPage ? 'active' : ''}"
                   onclick="changePage(${p})">${p}</button>`
    ).join('')}
    <button class="pagination__btn" ${currentPage === totalPages ? 'disabled' : ''}
            onclick="changePage(${currentPage + 1})">
      <svg width="12" height="12"><use href="#icon-chevron-right"/></svg>
    </button>`;
}
window.changePage = p => { if (p >= 1 && p <= totalPages) { loadCourses(p); scrollTo({ top: 0, behavior: 'smooth' }); } };

// ── Search + filter ────────────────────────────────
let searchTimer;
document.getElementById('search-input').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    currentPage = 1; updateFilterPills(); loadCourses(1);
  }, 320);
});
document.getElementById('filter-status').addEventListener('change', e => {
  filterActive = e.target.value;
  currentPage  = 1; updateFilterPills(); loadCourses(1);
});
function updateFilterPills() {
  const container = document.getElementById('filter-pills');
  const pills = [];
  if (filterActive === 'true')
    pills.push({ label: 'Active only',   clear: () => { filterActive = ''; document.getElementById('filter-status').value = ''; }});
  if (filterActive === 'false')
    pills.push({ label: 'Inactive only', clear: () => { filterActive = ''; document.getElementById('filter-status').value = ''; }});
  container.innerHTML = pills.map((p, i) => `
    <span class="filter-pill">
      ${p.label}
      <button onclick="clearPill(${i})" aria-label="Remove filter">
        <svg width="10" height="10" viewBox="0 0 16 16" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M3 3l10 10M13 3L3 13"/>
        </svg>
      </button>
    </span>`).join('');
  window._pillClears = pills.map(p => p.clear);
}
window.clearPill = i => { window._pillClears[i]?.(); loadCourses(1); };

// ── Detail panel ───────────────────────────────────
const detailPanel   = document.getElementById('detail-panel');
const panelBackdrop = document.getElementById('panel-backdrop');

function openDetailPanel(id) {
  panelCourseId = id;
  selectedCardId = id;

  // Highlight selected card
  document.querySelectorAll('.course-card').forEach(c =>
    c.classList.toggle('selected', c.dataset.id === id));

  // Reset panel
  switchTab('info');
  document.getElementById('panel-code').textContent = '—';
  document.getElementById('panel-name').textContent = '—';
  document.getElementById('panel-status-badge').innerHTML = '';
  document.getElementById('tab-info').innerHTML = `
    <div style="display:flex;flex-direction:column;gap:var(--sp-4)">
      ${[70, 50, 90, 100].map(w => `
        <div>
          <div class="skel" style="height:11px;width:55px;margin-bottom:6px"></div>
          <div class="skel" style="height:14px;width:${w}%"></div>
        </div>`).join('')}
    </div>`;
  document.getElementById('tab-classes').innerHTML = '';
  document.getElementById('panel-footer').innerHTML = '';

  detailPanel.classList.add('open');
  panelBackdrop.classList.add('open');

  courses.get(id).then(c => {
    document.getElementById('panel-code').textContent = c.code;
    document.getElementById('panel-name').textContent = c.name;
    document.getElementById('panel-status-badge').innerHTML =
      `<span class="badge ${c.is_active ? 'badge-green' : 'badge-red'}">
         ${c.is_active ? 'Active' : 'Inactive'}
       </span>`;

    document.getElementById('tab-info').innerHTML = `
      <div class="detail-field">
        <div class="detail-field__label">Description</div>
        <div class="detail-field__value" style="font-size:13px;line-height:1.65;color:var(--text-secondary)">
          ${c.description || '<span class="detail-field__empty">No description provided.</span>'}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-5)">
        <div class="detail-field">
          <div class="detail-field__label">Course code</div>
          <div class="detail-field__value"
               style="font-family:var(--font-mono);font-size:13px">${c.code}</div>
        </div>
        <div class="detail-field">
          <div class="detail-field__label">Total hours</div>
          <div class="detail-field__value">
            ${c.total_hours
              ? `<span style="font-size:18px;font-weight:600;letter-spacing:-0.3px">${c.total_hours}</span>
                 <span style="font-size:12px;color:var(--text-tertiary);margin-left:3px">hours</span>`
              : '<span class="detail-field__empty">Not set</span>'}
          </div>
        </div>
      </div>
      <div class="detail-field">
        <div class="detail-field__label">Created</div>
        <div class="detail-field__value">${fmtDate(c.created_at)}</div>
      </div>
      <div class="detail-field">
        <div class="detail-field__label">Last updated</div>
        <div class="detail-field__value">${fmtDate(c.updated_at)}</div>
      </div>`;

    if (canWrite) {
      document.getElementById('panel-footer').innerHTML = `
        <button class="btn btn-secondary flex-1" id="panel-edit-btn">
          <svg width="13" height="13"><use href="#icon-edit"/></svg>
          Edit
        </button>
        ${c.is_active
          ? `<button class="btn btn-danger" id="panel-deactivate-btn">Deactivate</button>`
          : `<span class="badge badge-red" style="margin:auto 0">Inactive</span>`}`;

      document.getElementById('panel-edit-btn')
        ?.addEventListener('click', () => openModal(c.id));
      document.getElementById('panel-deactivate-btn')
        ?.addEventListener('click', () => handleDeactivate(c.id, c.name));
    }
  }).catch(() => {
    document.getElementById('tab-info').innerHTML =
      `<p class="t-body-sm">Could not load course details.</p>`;
  });
}

// Lazy-load classes tab (admin + trainer only)
async function loadClassesTab(courseId) {
  const tab = document.getElementById('tab-classes');
  if (!canSeeClasses) {
    tab.innerHTML = `<p class="t-body-sm" style="color:var(--text-tertiary)">
      Classes are not available for your role.</p>`;
    return;
  }
  tab.innerHTML = `
    <div style="display:flex;flex-direction:column;gap:var(--sp-2)">
      ${[1,2,3].map(() =>
        `<div class="skel" style="height:58px;border-radius:var(--radius-md)"></div>`
      ).join('')}
    </div>`;
  try {
    const data = await courses.classes(courseId);
    const list = Array.isArray(data) ? data : (data.results ?? []);
    if (!list.length) {
      tab.innerHTML = `
        <div class="empty-state" style="padding:var(--sp-8) 0">
          <svg style="width:28px;height:28px;color:var(--text-tertiary);margin-bottom:var(--sp-2)"
               viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="1.5" y="3.5" width="13" height="9" rx="1.5"/>
            <path d="M1.5 7h13"/>
          </svg>
          <div class="empty-state__title" style="font-size:13px">No classes yet</div>
          <p style="font-size:12px;color:var(--text-tertiary);margin-top:4px">
            No classes have been created for this course.
          </p>
        </div>`;
      return;
    }
    tab.innerHTML = `
      <div class="class-mini-list">
        ${list.map(cl => `
          <div class="class-mini-item">
            <div>
              <div class="class-mini-item__name">${cl.name}</div>
              <div class="class-mini-item__sub">
                ${cl.trainer_name ?? '—'} ·
                ${cl.start_date ?? ''} → ${cl.end_date ?? ''}
              </div>
            </div>
            ${classBadge(cl.status)}
          </div>`).join('')}
      </div>`;
  } catch {
    tab.innerHTML = `<p class="t-body-sm" style="color:var(--color-red)">
      Could not load classes.</p>`;
  }
}

function switchTab(name) {
  document.querySelectorAll('.panel-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel-tab-content').forEach(c =>
    c.classList.toggle('active', c.id === `tab-${name}`));
}

document.querySelectorAll('.panel-tab').forEach(tab =>
  tab.addEventListener('click', () => {
    const name = tab.dataset.tab;
    switchTab(name);
    if (name === 'classes' && panelCourseId) {
      const el = document.getElementById('tab-classes');
      if (!el.innerHTML.trim()) loadClassesTab(panelCourseId);
    }
  }));

function closeDetailPanel() {
  detailPanel.classList.remove('open');
  panelBackdrop.classList.remove('open');
  selectedCardId = null;
  panelCourseId  = null;
  document.querySelectorAll('.course-card').forEach(c => c.classList.remove('selected'));
}

document.getElementById('panel-close').addEventListener('click', closeDetailPanel);
panelBackdrop.addEventListener('click', closeDetailPanel);
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeDetailPanel(); closeModal(); }
});

// ── Deactivate ─────────────────────────────────────
async function handleDeactivate(id, name) {
  if (!confirm(`Deactivate "${name}"?\nExisting classes will not be affected.`)) return;
  try {
    await courses.deactivate(id);
    showToast(`"${name}" has been deactivated.`);
    closeDetailPanel();
    loadCourses(currentPage);
  } catch (err) {
    showToast(err.message, true);
  }
}

// ── Create / Edit modal ────────────────────────────
const modal      = document.getElementById('modal');
const modalTitle = document.getElementById('modal-title');
const saveLabel  = document.getElementById('modal-save-label');
const saveBtn    = document.getElementById('modal-save');
const modalError = document.getElementById('modal-error');

function openModal(id = null) {
  editingId = id;
  clearModalErrors();
  modalError.style.display = 'none';

  const codeGroup   = document.getElementById('code-group');
  const activeGroup = document.getElementById('active-group');

  if (id) {
    modalTitle.textContent  = 'Edit course';
    saveLabel.textContent   = 'Save changes';
    // Code cannot be changed after creation
    codeGroup.style.display   = 'none';
    activeGroup.style.display = 'block';

    courses.get(id).then(c => {
      document.getElementById('f-name').value  = c.name          ?? '';
      document.getElementById('f-hours').value = c.total_hours   ?? '';
      document.getElementById('f-desc').value  = c.description   ?? '';
      document.getElementById(c.is_active ? 'f-active-yes' : 'f-active-no').checked = true;
    });
  } else {
    modalTitle.textContent  = 'New course';
    saveLabel.textContent   = 'Create course';
    codeGroup.style.display   = 'block';
    activeGroup.style.display = 'none';
    ['f-name','f-code','f-hours','f-desc'].forEach(fId =>
      { document.getElementById(fId).value = ''; });
  }

  modal.classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 80);
}

function closeModal() {
  modal.classList.remove('open');
  editingId = null;
}

document.getElementById('modal-close').addEventListener('click',  closeModal);
document.getElementById('modal-cancel').addEventListener('click', closeModal);
modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

function clearModalErrors() {
  ['f-name','f-code'].forEach(fId => document.getElementById(fId).classList.remove('error'));
  ['e-name','e-code'].forEach(eId => {
    const el = document.getElementById(eId);
    if (el) { el.textContent = ''; el.style.display = 'none'; }
  });
}

saveBtn.addEventListener('click', async () => {
  clearModalErrors();
  modalError.style.display = 'none';

  const name  = document.getElementById('f-name').value.trim();
  const code  = document.getElementById('f-code')?.value.trim().toUpperCase();
  const hours = parseInt(document.getElementById('f-hours').value, 10) || 0;
  const desc  = document.getElementById('f-desc').value.trim();

  let valid = true;
  if (!name) {
    document.getElementById('f-name').classList.add('error');
    const en = document.getElementById('e-name');
    en.textContent = 'Course name is required.'; en.style.display = 'block';
    valid = false;
  }
  if (!editingId && !code) {
    document.getElementById('f-code').classList.add('error');
    const ec = document.getElementById('e-code');
    ec.textContent = 'Course code is required.'; ec.style.display = 'block';
    valid = false;
  }
  if (!valid) return;

  const payload = { name, description: desc, total_hours: hours };
  if (!editingId) payload.code = code;
  if (editingId) {
    const activeVal = document.querySelector('input[name="f-active"]:checked')?.value;
    if (activeVal !== undefined) payload.is_active = activeVal === 'true';
  }

  saveBtn.disabled = true;
  saveLabel.textContent = editingId ? 'Saving…' : 'Creating…';

  try {
    if (editingId) {
      await courses.update(editingId, payload);
      showToast('Course updated successfully.');
    } else {
      await courses.create(payload);
      showToast('Course created successfully.');
    }
    closeModal();
    loadCourses(currentPage);
  } catch (err) {
    modalError.textContent = err.message ?? 'Something went wrong.';
    modalError.style.display = 'flex';
  } finally {
    saveBtn.disabled = false;
    saveLabel.textContent = editingId ? 'Save changes' : 'Create course';
  }
});

// ── Initial load ───────────────────────────────────
loadCourses(1);
</script>
